<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sklep</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:14px;
font-size:18px;
font-weight:bold;
}

.container{
padding:12px;
max-width:800px;
margin:auto;
}

.card{
background:white;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

.product{
border:1px solid #eee;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:black;
color:white;
width:100%;
}

</style>
</head>

<body>

<header>
Sklep
</header>

<div class="container">

<div id="storeBox"></div>

<div id="productsBox"></div>

</div>

<script>

const PRODUCTS_KEY = "qm_products_by_supplier_v1"
const STORE_KEY = "qm_active_store_v1"
const CART_KEY = "qm_cart_v1"

function safeParse(v,f){
try{return JSON.parse(v)}catch(e){return f}
}

function getStore(){
return safeParse(localStorage.getItem(STORE_KEY),null)
}

function getProducts(){
return safeParse(localStorage.getItem(PRODUCTS_KEY),[])
}

function getStoreProducts(){

let store = getStore()
let all = getProducts()

if(!store) return []

return all.filter(p => String(p.storeId) === String(store.id))

}

function addToCart(id){

let cart =
safeParse(localStorage.getItem(CART_KEY),[])

let products = getProducts()

let p = products.find(x=>x.id==id)

if(!p) return

cart.push({
id:p.id,
name:p.name,
price:p.finalPrice,
qty:1,
storeId:p.storeId
})

localStorage.setItem(
CART_KEY,
JSON.stringify(cart)
)

alert("Dodano")

}

function render(){

let store = getStore()

document.getElementById("storeBox").innerHTML =
store
? "<div class='card'>Sklep: "+store.name+"</div>"
: "<div class='card'>Brak sklepu</div>"

let list = getStoreProducts()

let box = document.getElementById("productsBox")

if(!list.length){

box.innerHTML =
"<div class='card'>Brak produktów</div>"

return

}

box.innerHTML=""

list.forEach(p=>{

let div=document.createElement("div")

div.className="product"

div.innerHTML=
"<b>"+p.name+"</b><br>"+
(p.description||"")+"<br>"+
"Cena: "+p.finalPrice+" zł<br>"+
"<button onclick='addToCart("+p.id+")'>Dodaj</button>"

box.appendChild(div)

})

}

render()

</script>

<script src="js/config.js"></script>
<script src="js/planGuard.js"></script>

</body>
</html>
