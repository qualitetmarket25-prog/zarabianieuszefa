<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Sklep — QualitetMarket</title>
  <link rel="icon" href="uszefaqualitet-logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app-layout.css">
</head>
<body>
  
<main class="container">
  <section class="hero">
    <div class="card pad">
      <span class="tag">Sklep</span>
      <h1 class="h1">Produkty z gotową marżą pod sprzedaż.</h1>
      <p class="lead">Ceny są liczone automatycznie na podstawie planu i logiki opłacalności dla tańszych oraz średnich produktów.</p>
    </div>
  </section>
  <section class="section">
    <div id="products" class="product-grid"></div>
  </section>
</main>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const CART_KEY = 'qm_cart_v1';
  const productsEl = document.getElementById('products');
  const products = QMAutoMargin.applyToCatalog();
  if (!products.length) {
    productsEl.innerHTML = '<div class="empty">Brak produktów. Wejdź do hurtowni i załaduj demo produkty.</div>';
    return;
  }
  productsEl.innerHTML = products.map((p, idx)=>`
    <article class="card pad product-card">
      <div class="product-hero">📦</div>
      <div>
        <h3 style="margin:0 0 6px">${p.name}</h3>
        <div class="muted">${p.supplier || 'Supplier'} • marża ${p.marginPct}%</div>
      </div>
      <div class="price-row">
        <span class="price-old">${Number(p.sourcePrice).toFixed(2)} PLN</span>
        <span class="price-new">${Number(p.price).toFixed(2)} PLN</span>
      </div>
      <button class="btn btn-primary" data-add="${idx}">Dodaj do koszyka</button>
    </article>
  `).join('');
  productsEl.querySelectorAll('[data-add]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const idx = Number(btn.getAttribute('data-add'));
      const item = products[idx];
      const cart = JSON.parse(localStorage.getItem(CART_KEY)||'[]');
      const found = cart.find(x=>x.name===item.name);
      if (found) found.qty += 1;
      else cart.push({name:item.name, price:item.price, qty:1});
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
      location.href = 'koszyk.html';
    });
  });
});
</script>

  <script src="js/subscriptions.js"></script>
  <script src="js/planGuard.js"></script>
  <script src="auto-margin.js"></script>
  <script src="app-shell.js"></script>
  
</body>
</html>
