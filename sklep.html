<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QualitetMarket — Sklep</title>
<link rel="stylesheet" href="app-layout.css">
</head>
<body>
<script src="app-shell.js"></script>
<script src="auto-margin.js"></script>
<script src="js/subscriptions.js"></script>
<script src="js/planGuard.js"></script>
<script>

function getProducts(){
  return qmUtils.read('qm_products_by_supplier_v1',[]);
}
function getCart(){
  return qmUtils.read('qm_cart_v1',[]);
}
function saveCart(cart){ qmUtils.write('qm_cart_v1', cart); }

renderShell({
  title:'QualitetMarket — Sklep',
  subtitle:'Sprzedaż produktów',
  content: `
    <section class="hero">
      <span class="badge">Sklep z automatyczną marżą</span>
      <h1>Produkty gotowe do sprzedaży</h1>
      <p>Każdy produkt ma cenę wyliczoną automatycznie na podstawie planu i marży.</p>
      <div class="hero-actions">
        <a class="btn btn-secondary" href="hurtownie.html">Dodaj produkty</a>
        <a class="btn btn-primary" href="koszyk.html">Przejdź do koszyka</a>
      </div>
    </section>
    <div class="section-title"><h2>Katalog</h2></div>
    <div id="shopList" class="list"></div>
  `
});

function addToCart(id){
  const products = getProducts();
  const p = products.find(x=>x.id===id);
  if(!p) return;
  const cart = getCart();
  const existing = cart.find(x=>x.id===id);
  if(existing) existing.qty += 1;
  else cart.push({...p, qty:1});
  saveCart(cart);
  alert('Dodano do koszyka');
  renderList();
}
window.addToCart = addToCart;

function renderList(){
  const list = getProducts();
  const el = document.getElementById('shopList');
  if(!list.length){
    el.innerHTML = `<div class="empty">Brak produktów. Najpierw wejdź w hurtownie i kliknij „Załaduj demo produkty”.</div>`;
    return;
  }
  el.innerHTML = list.map(p=>`
    <article class="list-item">
      <div class="meta">
        <img class="thumb" src="${p.img || 'uszefaqualitet-logo.svg'}" alt="">
        <div>
          <strong>${p.name}</strong>
          <div class="muted">${p.supplier || 'Dostawca'} • marża ${p.marginLabel || '-'}</div>
          <div class="muted">Baza: ${qmUtils.money(p.basePrice)}</div>
        </div>
      </div>
      <div class="row">
        <div class="price">${qmUtils.money(p.price)}</div>
        <button class="btn btn-primary" onclick="addToCart('${p.id}')">Dodaj</button>
      </div>
    </article>
  `).join('');
}
renderList();

</script>

</body>
</html>
