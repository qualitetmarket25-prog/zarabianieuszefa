<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Dashboard — QualitetMarket</title>
  <link rel="stylesheet" href="app-layout.css">
</head>
<body>
  <div id="appShell"></div>
  <div id="pageBody" class="hidden">
    
<section class="hero">
  <div class="hero-grid">
    <div>
      <h1>Dashboard</h1>
      <p>Wszystkie najważniejsze liczby: produkty, sklepy, zamówienia i aktywny sklep. Prosto, szybko i wygodnie na telefonie.</p>
      <div class="hero-actions">
        <a class="btn btn-primary" href="sklep.html">Sklep</a>
        <a class="btn" href="zamowienia.html">Zamówienia</a>
        <a class="btn" href="sklepy.html">Sklepy</a>
      </div>
    </div>
    <div class="kpis">
      <div class="kpi"><strong id="dashProducts">0</strong><span>Produkty</span></div>
      <div class="kpi"><strong id="dashOrders">0</strong><span>Zamówienia</span></div>
      <div class="kpi"><strong id="dashStores">0</strong><span>Sklepy</span></div>
      <div class="kpi"><strong id="dashMargin">20%</strong><span>Marża</span></div>
    </div>
  </div>
</section>

  </div>
  <script src="app-shell.js"></script>
  <script src="auto-margin.js"></script>
  <script>window.QM_APP.mount({title:'Dashboard', subtitle:'Podgląd sprzedaży i sklepów'});</script>
  
<script>
document.addEventListener('DOMContentLoaded', ()=>{
 const products = QM_APP.readJSON('qm_products_by_supplier_v1', []);
 const orders = QM_APP.readJSON('qm_orders_v1', []);
 const stores = QM_APP.readJSON('qm_stores_v1', []);
 document.getElementById('dashProducts').textContent = Array.isArray(products) ? products.length : 0;
 document.getElementById('dashOrders').textContent = Array.isArray(orders) ? orders.length : 0;
 document.getElementById('dashStores').textContent = Array.isArray(stores) ? stores.length : 0;
 document.getElementById('dashMargin').textContent = (localStorage.getItem('qm_store_margin_pct') || '20') + '%';
});
</script>

</body>
</html>
