<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard — QualitetMarket</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:14px;
font-size:18px;
font-weight:bold;
}

.container{
padding:12px;
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:14px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.btn{
display:block;
width:100%;
padding:14px;
margin-top:8px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.btn-main{
background:black;
color:white;
}

.btn-blue{
background:#007bff;
color:white;
}

.btn-green{
background:#28a745;
color:white;
}

.btn-orange{
background:#ff9800;
color:white;
}

.footer-space{
height:80px;
}

</style>
</head>

<body>

<header>
QualitetMarket — Dashboard
</header>

<div class="container">

<div class="card">

<div id="planBox">
Plan: basic
</div>

</div>

<div class="card">

<button class="btn btn-main"
onclick="go('intelligence.html')">
Intelligence
</button>

<button class="btn btn-blue"
onclick="go('hurtownie.html')">
Hurtownie
</button>

<button class="btn btn-green"
onclick="go('generator-sklepu.html')">
Generator sklepu
</button>

<button class="btn btn-orange"
onclick="go('sklepy.html')">
Moje sklepy
</button>

</div>

<div class="card">

<button class="btn"
onclick="logout()">
Wyloguj
</button>

</div>

<div class="footer-space"></div>

</div>


<script>

function go(p){
location.href = p
}

function logout(){
localStorage.clear()
location.href = "login.html"
}

function showPlan(){

let plan =
localStorage.getItem("qm_plan_v1") || "basic"

document.getElementById("planBox").innerText =
"Plan: " + plan

}

showPlan()

</script>


<script src="js/config.js"></script>
<script src="js/plan-guard.js"></script>

</body>
</html>
