<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Checkout — QualitetMarket</title>
  <link rel="icon" href="uszefaqualitet-logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app-layout.css">
</head>
<body>
  
<main class="container">
  <section class="hero">
    <div class="grid-2">
      <div class="card pad">
        <h1 class="h1">Checkout</h1>
        <form id="orderForm" class="form-grid">
          <label class="field"><span>Imię i nazwisko</span><input name="name" required></label>
          <label class="field"><span>E-mail</span><input name="email" type="email" required></label>
          <label class="field"><span>Telefon</span><input name="phone" required></label>
          <label class="field"><span>Miasto</span><input name="city" required></label>
          <label class="field" style="grid-column:1/-1"><span>Adres</span><input name="address" required></label>
          <button class="btn btn-primary" type="submit">Złóż zamówienie</button>
        </form>
      </div>
      <div class="card pad">
        <h2 class="h2">Podsumowanie</h2>
        <div id="summary"></div>
      </div>
    </div>
  </section>
</main>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const cart = JSON.parse(localStorage.getItem('qm_cart_v1')||'[]');
  const total = cart.reduce((s,x)=>s+x.price*x.qty,0);
  document.getElementById('summary').innerHTML = cart.length
    ? `<div class="list">${cart.map(x=>`<div>${x.name} × ${x.qty} — ${(x.price*x.qty).toFixed(2)} PLN</div>`).join('')}</div><hr class="sep"><div class="price"><strong>${total.toFixed(2)}</strong><span>PLN</span></div>`
    : '<div class="empty">Koszyk pusty.</div>';
  document.getElementById('orderForm').addEventListener('submit',(e)=>{
    e.preventDefault();
    const orders = JSON.parse(localStorage.getItem('qm_orders_v1')||'[]');
    const data = Object.fromEntries(new FormData(e.target).entries());
    orders.unshift({
      id:'ORD-' + Date.now(),
      createdAt:new Date().toISOString(),
      items:cart,
      total:Number(total.toFixed(2)),
      customer:data
    });
    localStorage.setItem('qm_orders_v1', JSON.stringify(orders));
    localStorage.removeItem('qm_cart_v1');
    location.href = 'zamowienia.html';
  });
});
</script>

  <script src="js/subscriptions.js"></script>
  <script src="js/planGuard.js"></script>
  <script src="auto-margin.js"></script>
  <script src="app-shell.js"></script>
  
</body>
</html>
