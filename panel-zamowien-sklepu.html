<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Panel zamówień sklepu — QualitetMarket</title>
  <link rel="stylesheet" href="app-layout.css">
</head>
<body>
  <div id="appShell"></div>
  <div id="pageBody" class="hidden">
    
<section class="hero">
  <div class="hero-grid">
    <div>
      <h1>Panel zamówień sklepu</h1>
      <p>Panel pod sprzedawcę. Tu masz szybkie statystyki i prostą listę zamówień z aktywnego sklepu.</p>
      <div class="hero-actions">
        <a class="btn btn-primary" href="zamowienia.html">Wszystkie zamówienia</a>
        <a class="btn" href="sklepy.html">Sklepy</a>
      </div>
    </div>
    <div class="kpis">
      <div class="kpi"><strong id="poNew">0</strong><span>Nowe</span></div>
      <div class="kpi"><strong id="poPaid">0</strong><span>Opłacone</span></div>
      <div class="kpi"><strong id="poShipped">0</strong><span>Wysłane</span></div>
      <div class="kpi"><strong id="poRevenue">0,00 zł</strong><span>Obrót</span></div>
    </div>
  </div>
</section>
<section class="card">
  <h2>Ostatnie zamówienia</h2>
  <div id="poList"></div>
</section>

  </div>
  <script src="app-shell.js"></script>
  <script src="auto-margin.js"></script>
  <script>window.QM_APP.mount({title:'Panel zamówień sklepu', subtitle:'Podgląd zamówień sprzedawcy'});</script>
  
<script>
document.addEventListener('DOMContentLoaded', ()=>{
  const slug = QM_APP.activeStore();
  const orders = QM_APP.readJSON('qm_orders_v1', []).filter(o => String(o.storeSlug || 'default') === slug);
  const count = (s) => orders.filter(o => String(o.status || 'new') === s).length;
  document.getElementById('poNew').textContent = count('new');
  document.getElementById('poPaid').textContent = count('paid');
  document.getElementById('poShipped').textContent = count('shipped');
  document.getElementById('poRevenue').textContent = QM_APP.money(orders.reduce((a,b)=>a+(Number(b.totals?.gross||0)||0),0));
  document.getElementById('poList').innerHTML = orders.length ? `
    <div class="table-wrap"><table><thead><tr><th>Numer</th><th>Klient</th><th>Status</th><th>Kwota</th></tr></thead><tbody>
    ${orders.slice(0,20).map(o=>`<tr><td>${o.orderNo || o.id}</td><td>${o.customer?.name || '-'}</td><td>${o.status || 'new'}</td><td>${QM_APP.money(o.totals?.gross || 0)}</td></tr>`).join('')}
    </tbody></table></div>` : '<div class="empty">Brak zamówień dla aktywnego sklepu.</div>';
});
</script>

</body>
</html>
