<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panel zamówień sklepu – QualitetMarket</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .wrap{max-width:1100px;margin:26px auto;padding:0 14px}
    .card{border:1px solid rgba(0,0,0,.1);border-radius:14px;padding:14px;background:#fff}
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 12px;border-radius:12px;border:0;cursor:pointer;font-weight:900}
    .btn.primary{background:#111;color:#fff}
    .btn.ghost{background:transparent;border:1px solid rgba(0,0,0,.14)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid rgba(0,0,0,.08);vertical-align:top;text-align:left}
    .muted{opacity:.75}
    select,input{padding:8px 10px;border-radius:10px;border:1px solid rgba(0,0,0,.14)}
    .pill{display:inline-flex;padding:3px 8px;border-radius:999px;border:1px solid rgba(0,0,0,.14);font-size:12px}
  </style>
  <script defer src="./js/panelOrders.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="pill" id="storeInfo">Sklep: …</div>
        <h1 style="margin:6px 0 0;">Panel zamówień</h1>
        <div class="muted">Zmiana statusów + eksport</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <a class="btn ghost" href="./platforma.html">← Platforma</a>
        <button class="btn ghost" id="btnExportCsv">Eksport CSV</button>
        <button class="btn ghost" id="btnExportJson">Eksport JSON</button>
      </div>
    </div>

    <div class="card" style="margin-bottom:12px;">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
        <label class="muted">Status:</label>
        <select id="statusFilter">
          <option value="">Wszystkie</option>
          <option>NEW</option>
          <option>CONFIRMED</option>
          <option>SENT</option>
          <option>DONE</option>
        </select>

        <label class="muted">Szukaj:</label>
        <input id="q" placeholder="ID / email / nazwisko" />

        <span class="muted" id="kpi"></span>
      </div>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>ID</th>
            <th>Klient</th>
            <th>Razem brutto</th>
            <th>Prowizja</th>
            <th>Status</th>
            <th>Akcje</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</body>
</html>
