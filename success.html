<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sukces — QualitetMarket</title>
  <link rel="stylesheet" href="app-layout.css" />
</head>
<body>
  <main class="page narrow">
    <section class="card success-card">
      <div class="success-icon">✓</div>
      <p class="eyebrow">Gotowe</p>
      <h1>Plan został aktywowany</h1>
      <p id="successSummary">Subskrypcja zapisana w aplikacji.</p>
      <div class="actions stack-mobile">
        <a class="btn btn-primary" href="platforma.html">Przejdź do platformy</a>
        <a class="btn btn-secondary" href="dashboard.html">Przejdź do dashboardu</a>
      </div>
    </section>
  </main>

  <script src="js/subscriptions.js"></script>
  <script>
    (function () {
      var plan = localStorage.getItem('qm_plan_v1') || 'basic';
      var margin = localStorage.getItem('qm_store_margin_pct') || '18';
      var el = document.getElementById('successSummary');
      if (el) {
        el.textContent = 'Aktywny plan: ' + plan.toUpperCase() + ' | Marża: ' + margin + '%';
      }
    })();
  </script>
</body>
</html>
