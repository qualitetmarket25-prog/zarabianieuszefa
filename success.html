<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Success — QualitetMarket</title>
  <link rel="icon" href="uszefaqualitet-logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app-layout.css">
</head>
<body>
  
<main class="container">
  <section class="hero">
    <div class="card pad">
      <span class="tag">Success</span>
      <h1 class="h1">Subskrypcja uruchomiona.</h1>
      <p class="lead">Plan jest zapisany. Marża sklepu jest ustawiona. Produkty w katalogu są przeliczone automatycznie.</p>
      <div class="grid-3" style="margin-top:16px">
        <div class="card pad kpi"><div class="label">Plan</div><div class="value" id="planOut">—</div></div>
        <div class="card pad kpi"><div class="label">Cena</div><div class="value" id="priceOut">—</div></div>
        <div class="card pad kpi"><div class="label">Marża</div><div class="value" id="marginOut">—</div></div>
      </div>
      <div class="cta-row" style="margin-top:16px">
        <a class="btn btn-primary" href="platforma.html">Przejdź do platformy</a>
        <a class="btn btn-secondary" href="sklep.html">Zobacz sklep</a>
        <a class="btn btn-secondary" href="hurtownie.html">Zobacz hurtownie</a>
      </div>
    </div>
  </section>
</main>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const s = QMSubscriptions.getSubscription();
  document.getElementById('planOut').textContent = (s.plan||'basic').toUpperCase();
  document.getElementById('priceOut').textContent = `${s.price} ${s.currency}/${s.cycle}`;
  document.getElementById('marginOut').textContent = `${s.marginPct}%`;
});
</script>

  <script src="js/subscriptions.js"></script>
  <script src="js/planGuard.js"></script>
  <script src="auto-margin.js"></script>
  <script src="app-shell.js"></script>
  
</body>
</html>
