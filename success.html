<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sukces</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
color:#111;
}
header{
background:#111;
color:#fff;
padding:14px;
font-size:18px;
font-weight:bold;
}
.container{
max-width:700px;
margin:0 auto;
padding:12px;
}
.card{
background:#fff;
border-radius:12px;
padding:18px 14px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
text-align:center;
}
.ok{
font-size:48px;
margin-bottom:12px;
}
.title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}
.text{
font-size:15px;
color:#555;
line-height:1.5;
margin-bottom:16px;
}
.btn,
button{
display:block;
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
text-align:center;
text-decoration:none;
box-sizing:border-box;
cursor:pointer;
}
.btn-black{
background:#111;
color:#fff;
}
.btn-white{
background:#fff;
color:#111;
border:1px solid #ddd;
}
.actions{
display:flex;
flex-direction:column;
gap:10px;
}
.info{
font-size:14px;
color:#666;
margin-top:10px;
}
</style>
</head>
<body>

<header>
Płatność zakończona
</header>

<div class="container">

<div class="card">
<div class="ok">✅</div>
<div class="title">Zamówienie zostało zapisane</div>
<div class="text">
Dziękujemy. Zamówienie trafiło do systemu i możesz je zobaczyć na liście zamówień.
</div>

<div class="actions">
<a href="zamowienia.html" class="btn btn-black">Zobacz zamówienia</a>
<a href="sklep.html" class="btn btn-white">Wróć do sklepu</a>
</div>

<div class="info" id="orderInfo">
Status: nowe zamówienie
</div>
</div>

</div>

<script>
const CART_KEY = "qm_cart_v1";
const LAST_ORDER_KEY = "qm_last_order_v1";

function safeParse(value, fallback){
  try{
    return JSON.parse(value);
  }catch(e){
    return fallback;
  }
}

function clearCart(){
  localStorage.removeItem(CART_KEY);
}

function showLastOrder(){
  const order = safeParse(localStorage.getItem(LAST_ORDER_KEY), null);
  if(!order) return;

  const info = document.getElementById("orderInfo");
  info.innerText = "Zamówienie #" + order.id + " • status: " + (order.status || "nowe");
}

clearCart();
showLastOrder();
</script>

<script src="js/config.js"></script>
<script src="js/planGuard.js"></script>

</body>
</html>
