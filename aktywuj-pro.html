<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Aktywacja PRO</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<section class="section">
  <div class="container">
    <div class="card highlight">
      <h2>Aktywuj Status PRO</h2>
      <p>Po aktywacji otrzymasz dostęp do funkcji premium.</p>
      <button class="btn-primary" onclick="activatePro()">Aktywuj PRO</button>
      <p id="status" style="margin-top:20px;"></p>
    </div>
  </div>
</section>

<script>
function activatePro() {
  localStorage.setItem("status", "PRO");
  document.getElementById("status").innerHTML = "✅ Status PRO aktywowany!";
}
</script>

</body>
</html>
