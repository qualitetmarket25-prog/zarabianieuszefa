
<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aktywacja planu – QualitetMarket</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    :root{color-scheme:dark;--bg:#08111f;--panel:#101b2e;--stroke:rgba(255,255,255,.08);--text:#eef4ff;--muted:#9db0cf;--brand:#55e7a7;--brand2:#66b6ff;--shadow:0 20px 50px rgba(0,0,0,.35)}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#08111f,#050a12);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,sans-serif}.wrap{max-width:860px;margin:0 auto;padding:22px}
    a{text-decoration:none;color:inherit}.back{display:inline-flex;align-items:center;gap:8px;color:#a7d9ff;font-weight:800;margin-bottom:16px}
    .card{padding:28px;border-radius:28px;border:1px solid var(--stroke);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.025));box-shadow:var(--shadow)}
    .eyebrow{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(85,231,167,.12);color:#98f0c9;font-weight:900;font-size:12px;letter-spacing:.12em;text-transform:uppercase}.plan{font-size:44px;font-weight:950;margin:16px 0 4px}.price{font-size:24px;font-weight:800}.muted{color:var(--muted);line-height:1.7}.features{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}.f{padding:16px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid var(--stroke)}
    .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}.btn{display:inline-flex;justify-content:center;align-items:center;min-height:50px;padding:14px 18px;border-radius:16px;font-weight:900}.btn-main{background:linear-gradient(135deg,var(--brand),#71ffd1);color:#032317;border:none}.btn-ghost{background:#131f34;border:1px solid var(--stroke)}
    .status{margin-top:16px;padding:14px 16px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid var(--stroke);font-weight:700}
    @media (max-width: 760px){.features{grid-template-columns:1fr}.wrap{padding:16px}.btn{width:100%}}
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="./cennik.html">← Wróć do planów</a>
    <section class="card">
      <div class="eyebrow">Aktywacja demo</div>
      <div class="plan" id="planName">PRO</div>
      <div class="price" id="planPrice">149 zł / mies.</div>
      <p class="muted">Kliknięcie zapisuje plan lokalnie, ustawia domyślną marżę sklepu zgodnie z planem i przygotowuje użytkownika do dalszych kroków. Docelowo w tym miejscu podpinasz Stripe albo inną płatność.</p>

      <div class="features" id="planFeatures"></div>

      <div class="actions">
        <button class="btn btn-main" id="activateBtn">Aktywuj plan</button>
        <a class="btn btn-ghost" href="./login.html">Logowanie</a>
        <a class="btn btn-ghost" href="./platforma.html">Mam już plan</a>
      </div>

      <div class="status" id="statusBox">Ładowanie planu...</div>
    </section>
  </div>

  <script src="./js/subscriptions.js"></script>
  <script>
    (function(){
      const params = new URL(window.location.href).searchParams;
      const planId = (params.get('plan') || 'pro').toLowerCase();
      const plan = QM_SUBS.getPlanConfig(planId);
      const name = document.getElementById('planName');
      const price = document.getElementById('planPrice');
      const features = document.getElementById('planFeatures');
      const status = document.getElementById('statusBox');
      const btn = document.getElementById('activateBtn');

      name.textContent = plan.label;
      price.textContent = `${plan.price} zł / mies.`;
      features.innerHTML = plan.features.map((item) => `<div class="f">${item}</div>`).join('');
      status.textContent = `Wybrany plan: ${plan.label}. Domyślna marża po aktywacji: ${Math.round(plan.defaultMargin * 100)}%.`;

      btn.addEventListener('click', () => {
        QM_SUBS.activatePlan(plan.id);
        status.textContent = `Plan ${plan.label} aktywowany. Domyślna marża ustawiona na ${Math.round(plan.defaultMargin * 100)}%. Teraz możesz wejść do panelu sklepu albo otworzyć sklep.`;
        btn.textContent = 'Aktywowano';
        btn.disabled = true;
      });
    })();
  </script>
</body>
</html>
