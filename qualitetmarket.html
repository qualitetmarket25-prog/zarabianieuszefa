<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QualitetMarket</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <div class="logo">Zarabianie<span>uSzefa</span></div>
    <div>
      <a href="index.html" class="nav-link">Strona</a>
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="#" class="nav-btn" onclick="logout()">Wyloguj</a>
    </div>
  </div>
</header>

<section class="section">
  <div class="container">

    <h2>Katalog Produktów PRO</h2>

    <div id="productGrid" class="grid-3" style="margin-top:30px;"></div>

  </div>
</section>

<footer class="footer">
  <div class="container footer-inner">
    <div>© 2026 Zarabianie u Szefa</div>
    <div>QualitetMarket PRO</div>
  </div>
</footer>

<script>
if (localStorage.getItem("status") !== "PRO") {
  document.body.innerHTML = `
    <section class="section">
      <div class="container">
        <div class="card highlight">
          <h2>🔒 Dostęp tylko dla PRO</h2>
          <a href="aktywuj-pro.html" class="btn-primary">Aktywuj PRO</a>
        </div>
      </div>
    </section>
  `;
}

const products = [
  {
    name: "Produkt 1",
    margin: "40%",
    desc: "Produkt z wysoką marżą, szybka sprzedaż."
  },
  {
    name: "Produkt 2",
    margin: "55%",
    desc: "Idealny pod marketplace i ogłoszenia."
  },
  {
    name: "Produkt 3",
    margin: "60%",
    desc: "Produkt premium dla klientów detalicznych."
  }
];

const grid = document.getElementById("productGrid");

products.forEach((p, index) => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <h3>${p.name}</h3>
    <p style="margin:10px 0;">Marża: <strong>${p.margin}</strong></p>
    <p style="color:#94a3b8;">${p.desc}</p>
    <button class="btn-primary" style="margin-top:15px;" onclick="copyDesc(${index})">Kopiuj opis</button>
  `;
  grid.appendChild(card);
});

function copyDesc(i) {
  const text = products[i].name + " - " + products[i].desc;
  navigator.clipboard.writeText(text);
  alert("Skopiowano opis produktu.");
}

function logout() {
  localStorage.removeItem("status");
  window.location.href = "index.html";
}
</script>

</body>
</html>
