<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QualitetMarket — Start</title>
<link rel="stylesheet" href="app-layout.css">
</head>
<body>
<script src="app-shell.js"></script>
<script src="auto-margin.js"></script>
<script src="js/subscriptions.js"></script>
<script src="js/planGuard.js"></script>
<script>

renderShell({
  title:'QualitetMarket — Start',
  subtitle:'Zarabianie przez sklep, dropshipping i marżę',
  content: `
    <section class="hero">
      <span class="badge">Start aplikacji</span>
      <h1>Nowoczesny panel do zarabiania online</h1>
      <p>Uruchamiasz sklep, ustawiasz plan, importujesz produkty z hurtowni i sprzedajesz z automatyczną marżą. Wszystko działa na telefonie i GitHub Pages.</p>
      <div class="hero-actions">
        <a class="btn btn-primary" href="platforma.html">Wejdź do platformy</a>
        <a class="btn btn-secondary" href="cennik.html">Zobacz cennik</a>
        <a class="btn btn-secondary" href="hurtownie.html">Importuj produkty</a>
      </div>
    </section>

    <section class="grid cards">
      <article class="card span-3 kpi"><span class="muted">Aktywny plan</span><strong>${qmState.getPlan().toUpperCase()}</strong><span class="muted">Zmiana w cenniku</span></article>
      <article class="card span-3 kpi"><span class="muted">Marża</span><strong>${qmState.getMargin()}%</strong><span class="muted">Auto pricing w sklepie</span></article>
      <article class="card span-3 kpi"><span class="muted">Produkty</span><strong id="kpiProducts">0</strong><span class="muted">Zaimportowane do sprzedaży</span></article>
      <article class="card span-3 kpi"><span class="muted">Zamówienia</span><strong id="kpiOrders">0</strong><span class="muted">W Twojej aplikacji</span></article>
    </section>

    <div class="section-title"><h2>Główne moduły</h2><span class="muted">Kliknij i działaj</span></div>
    <section class="module-grid">
      ${[
        ['🧭','Platforma','Jedno miejsce do sterowania aplikacją.','platforma.html'],
        ['🏭','Hurtownie','Import demo i własnych produktów CSV.','hurtownie.html'],
        ['🛍️','Sklep','Sprzedaż z automatyczną marżą.','sklep.html'],
        ['🛒','Koszyk','Szybka ścieżka zakupowa mobile.','koszyk.html'],
        ['💳','Checkout','Zapis zamówień i dane klienta.','checkout.html'],
        ['💸','Cennik','Plany Basic / Pro / Elite.','cennik.html']
      ].map(item=>`
      <article class="module">
        <div class="emoji">${item[0]}</div>
        <h3>${item[1]}</h3>
        <p>${item[2]}</p>
        <div class="actions"><a class="btn btn-primary" href="${item[3]}">Otwórz</a></div>
      </article>`).join('')}
    </section>
  `
});
document.getElementById('kpiProducts').textContent = (qmUtils.read('qm_products_by_supplier_v1',[]) || []).length;
document.getElementById('kpiOrders').textContent = (qmUtils.read('qm_orders_v1',[]) || []).length;

</script>

</body>
</html>
