<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt — QualitetMarket</title>
  <meta name="description" content="Kontakt do firmy i obsługi">
  <link rel="icon" href="uszefaqualitet-logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app-layout.css">
</head>
<body>
  <div data-app-header></div>
  <main class="page">
    <div class="container">
      
<section class="panel hero-card">
  <span class="eyebrow">Kontakt</span>
  <h1>Kontakt i dane firmy</h1>
  <p>Tu wpisz swoje dane przed startem: e-mail, numer telefonu, adres i dane firmy.</p>
  <div class="form">
    <input class="input" value="kontakt@twojadomena.pl" aria-label="Email">
    <input class="input" value="+48 000 000 000" aria-label="Telefon">
    <input class="input" value="Nazwa firmy / adres / NIP" aria-label="Dane firmy">
  </div>
  <div class="actions"><a class="btn" href="mailto:kontakt@twojadomena.pl">Napisz e-mail</a></div>
</section>

    </div>
  </main>
  <div data-app-footer></div>
  <div data-app-bottomnav></div>
  <script src="app-shell.js"></script>
  <script src="auto-margin.js"></script>
</body>
</html>
