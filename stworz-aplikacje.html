<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Stwórz swoją aplikację — UszefaQualitet</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app-layout.css">
  
</head>
<body class="app-page" data-title="Stwórz swoją aplikację">

<section class="grid cols-2">
  <div class="card">
    <h1>Stwórz swoją aplikację</h1>
    <p class="muted">Uproszczony kreator aplikacji dla sklepu, nieruchomości, aut, ogłoszeń i usług.</p>
    <form id="createAppForm" class="grid">
      <input class="input" name="name" placeholder="Nazwa aplikacji" required>
      <select name="type"><option>Sklep</option><option>Ogłoszenia</option><option>Nieruchomości</option><option>Motoryzacja</option><option>Usługi</option></select>
      <select name="plan"><option>Pro</option><option>Elite</option><option>Boss</option></select>
      <textarea name="idea" placeholder="Co ma robić aplikacja?"></textarea>
      <button class="btn" type="submit">Zapisz aplikację</button>
    </form>
  </div>
  <div class="card">
    <h2>Co dostaje użytkownik</h2>
    <div class="list">
      <div class="list-item"><strong>Gotowy kierunek</strong><span class="tag">bez stresu</span></div>
      <div class="list-item"><strong>Możliwość pobrania</strong><span class="tag">mobile</span></div>
      <div class="list-item"><strong>Sklep + reklama + AI</strong><span class="tag">moc</span></div>
    </div>
  </div>
</section>

<script src="app-shell.js"></script>
</body>
</html>
