<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dodaj ogłoszenie — UszefaQualitet</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app-layout.css">
  
</head>
<body class="app-page" data-title="Dodaj ogłoszenie">

<section class="grid cols-2">
  <div class="card">
    <h1>Dodaj ogłoszenie</h1>
    <form id="addAdForm" class="grid">
      <input class="input" name="title" placeholder="Tytuł ogłoszenia" required>
      <select name="category"><option>Nieruchomości</option><option>Auta</option><option>Używane</option><option>Usługi</option></select>
      <input class="input" name="price" placeholder="Cena">
      <input class="input" name="city" placeholder="Miasto">
      <textarea name="desc" placeholder="Opis"></textarea>
      <button class="btn" type="submit">Zapisz ogłoszenie</button>
    </form>
  </div>
  <div class="card"><h2>Wskazówka</h2><p class="muted">Lepsze wyniki dają zdjęcia, krótki tytuł i opcja promowania reklamy.</p><a class="btn secondary" href="reklama.html">Od razu zrób reklamę</a></div>
</section>

<script src="app-shell.js"></script>
</body>
</html>
