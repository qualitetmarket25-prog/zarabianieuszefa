<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QualitetMarket — Sklepy</title>
<link rel="stylesheet" href="app-layout.css">
</head>
<body>
<script src="app-shell.js"></script>
<script src="auto-margin.js"></script>
<script src="js/subscriptions.js"></script>
<script src="js/planGuard.js"></script>
<script>

function getStores(){ return qmUtils.read('qm_stores_v1',[]); }
function setStores(stores){ qmUtils.write('qm_stores_v1', stores); }
function currentSlug(){ return localStorage.getItem('qm_active_store_v1') || ''; }

renderShell({
  title:'QualitetMarket — Sklepy',
  subtitle:'Multi-store',
  content: `
    <section class="hero">
      <span class="badge">Sklepy</span>
      <h1>Ustaw swój sklep</h1>
      <p>Dodajesz sklep, ustawiasz aktywny i zapisujesz marżę pod sprzedaż.</p>
    </section>
    <section class="card" style="margin-top:18px">
      <form id="storeForm" class="form-grid">
        <div class="col-6"><label>Nazwa sklepu<input class="input" name="name" required></label></div>
        <div class="col-6"><label>Slug<input class="input" name="slug" required placeholder="moj-sklep"></label></div>
        <div class="col-6"><label>Marża %<input class="input" name="margin" type="number" min="1" step="1" value="${qmState.getMargin()}" required></label></div>
        <div class="col-6" style="display:flex;align-items:end"><button class="btn btn-primary" type="submit">Dodaj sklep</button></div>
      </form>
    </section>
    <div id="storesList" class="list" style="margin-top:18px"></div>
  `
});

document.getElementById('storeForm').addEventListener('submit', function(e){
  e.preventDefault();
  const fd = new FormData(this);
  const store = Object.fromEntries(fd.entries());
  store.id = qmUtils.uid('store');
  const stores = getStores();
  stores.push(store);
  setStores(stores);
  localStorage.setItem('qm_active_store_v1', store.slug);
  localStorage.setItem('qm_store_margin_pct', String(store.margin));
  this.reset();
  renderStores();
});

window.activateStore = function(slug, margin){
  localStorage.setItem('qm_active_store_v1', slug);
  localStorage.setItem('qm_store_margin_pct', String(margin));
  alert('Aktywny sklep ustawiony.');
  renderStores();
}
window.deleteStore = function(id){
  setStores(getStores().filter(s=>s.id!==id));
  renderStores();
}

function renderStores(){
  const stores = getStores();
  const slug = currentSlug();
  const el = document.getElementById('storesList');
  if(!stores.length){
    el.innerHTML = `<div class="empty">Brak sklepów.</div>`;
    return;
  }
  el.innerHTML = stores.map(s=>`
    <article class="list-item">
      <div>
        <strong>${s.name}</strong>
        <div class="muted">slug: ${s.slug} • marża: ${s.margin}% ${slug===s.slug ? '• aktywny' : ''}</div>
      </div>
      <div class="row">
        <button class="btn btn-primary" onclick="activateStore('${s.slug}','${s.margin}')">Aktywuj</button>
        <button class="btn btn-danger" onclick="deleteStore('${s.id}')">Usuń</button>
      </div>
    </article>
  `).join('');
}
renderStores();

</script>

</body>
</html>
