<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:14px;
font-size:18px;
font-weight:bold;
}

.container{
padding:12px;
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:14px;
border-radius:12px;
margin-bottom:12px;
}

input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
background:black;
color:white;
}

</style>
</head>

<body>

<header>
Checkout
</header>

<div class="container">

<div class="card">

Imię

<input id="name">

Email

<input id="email">

Adres

<input id="address">

<button onclick="buy()">
Kupuję
</button>

</div>

</div>

<script>

const CART_KEY = "qm_cart_v1"
const ORDERS_KEY = "qm_orders_v1"
const STORE_KEY = "qm_active_store_v1"


function buy(){

let cart =
JSON.parse(localStorage.getItem(CART_KEY) || "[]")

if(cart.length==0){

alert("Koszyk pusty")
return

}

let orders =
JSON.parse(localStorage.getItem(ORDERS_KEY) || "[]")

let store =
JSON.parse(localStorage.getItem(STORE_KEY) || "null")

let order = {

id: Date.now(),
date: Date.now(),
items: cart,
store: store

}

orders.push(order)

localStorage.setItem(
ORDERS_KEY,
JSON.stringify(orders)
)

localStorage.removeItem(CART_KEY)

location.href = "success.html"

}

</script>

<script src="js/config.js"></script>
<script src="js/planGuard.js"></script>

</body>
</html>
