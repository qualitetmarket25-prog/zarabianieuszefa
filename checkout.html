<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Checkout – QualitetMarket</title>

  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="./shop.css" />

  <script defer src="./js/shopCart.js"></script>
  <script defer src="./js/checkout.js"></script>

  <style>
    .grid { display:grid; grid-template-columns: 1.2fr .8fr; gap:14px; }
    @media (max-width: 980px){ .grid { grid-template-columns:1fr; } }
    .card { border:1px solid rgba(0,0,0,.1); border-radius:14px; padding:14px; background:#fff; }
    .h { font-size:22px; font-weight:900; margin:0 0 8px; }
    .muted { opacity:.75; }
    label{ display:block; font-weight:800; margin:10px 0 6px; }
    input, textarea, select{
      width:100%; padding:10px 12px; border-radius:12px;
      border:1px solid rgba(0,0,0,.16);
      font: inherit;
    }
    .row{ display:flex; gap:10px; }
    .row > *{ flex:1; }
    .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 12px; border-radius:12px; border:0; cursor:pointer; font-weight:900; }
    .btn.primary{ background:#111; color:#fff; }
    .btn.ghost{ background:transparent; border:1px solid rgba(0,0,0,.14); }
    .kpi{ display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed rgba(0,0,0,.12); }
    .kpi:last-child{ border-bottom:0; }
    .pill{ display:inline-flex; padding:4px 8px; border-radius:999px; border:1px solid rgba(0,0,0,.14); font-size:12px; opacity:.85; }
  </style>
</head>
<body>
  <div class="wrap">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; margin:16px 0;">
      <div>
        <div class="pill" id="storeBadge">Sklep</div>
        <h1 style="margin:6px 0 0;">Checkout</h1>
        <div class="muted">Dane dostawy, płatność później</div>
      </div>
      <div style="display:flex; gap:10px;">
        <a class="btn ghost" href="./koszyk.html">← Wróć do koszyka</a>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="h">Dane dostawy</div>

        <form id="checkoutForm">
          <div class="row">
            <div>
              <label>Imię i nazwisko</label>
              <input required name="fullName" autocomplete="name" />
            </div>
            <div>
              <label>Telefon</label>
              <input required name="phone" autocomplete="tel" />
            </div>
          </div>

          <label>Email</label>
          <input required type="email" name="email" autocomplete="email" />

          <label>Ulica i nr</label>
          <input required name="street" autocomplete="street-address" />

          <div class="row">
            <div>
              <label>Kod pocztowy</label>
              <input required name="zip" autocomplete="postal-code" />
            </div>
            <div>
              <label>Miasto</label>
              <input required name="city" autocomplete="address-level2" />
            </div>
          </div>

          <label>Kraj</label>
          <input required name="country" value="Polska" autocomplete="country-name" />

          <label>Uwagi do zamówienia</label>
          <textarea name="notes" rows="3" placeholder="np. dostawa po 16:00, zostawić pod drzwiami"></textarea>

          <label>Metoda płatności</label>
          <select name="paymentMethod">
            <option value="PAY_LATER" selected>Płatność później (kontakt ze sprzedawcą)</option>
          </select>

          <div style="display:flex; gap:10px; margin-top:14px;">
            <button class="btn primary" type="submit">Złóż zamówienie</button>
            <button class="btn ghost" type="button" id="btnExportDraft">Eksport (JSON)</button>
          </div>

          <div class="muted" style="margin-top:10px;">
            Po złożeniu zamówienia dostaniesz podsumowanie, a sprzedawca zobaczy je w panelu zamówień.
          </div>
        </form>
      </div>

      <div class="card">
        <div class="h">Podsumowanie</div>
        <div id="summaryBox" class="muted">Ładuję koszyk…</div>
      </div>
    </div>
  </div>
</body>
</html>
