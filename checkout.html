<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QualitetMarket — Cennik</title>
<link rel="stylesheet" href="app-layout.css">
</head>
<body>
<script src="app-shell.js"></script>
<script src="auto-margin.js"></script>
<script src="js/subscriptions.js"></script>
<script src="js/planGuard.js"></script>
<script>

renderShell({
  title:'QualitetMarket — Cennik',
  subtitle:'Plany subskrypcji',
  content: `
    <section class="hero">
      <span class="badge">Cennik i subskrypcje</span>
      <h1>Wybierz plan, który zwiększa zysk</h1>
      <p>Wyższy plan = większa domyślna marża i więcej możliwości sprzedaży.</p>
    </section>
    <section class="pricing" style="margin-top:18px">
      ${Object.entries(qmSubscriptions.plans).map(([key,val])=>`
      <article class="price-card ${key==='pro' ? 'featured' : ''}">
        <span class="badge">${key.toUpperCase()}</span>
        <h3>${key==='basic'?'Start sprzedaży':key==='pro'?'Najlepszy dla większości':'Maksymalny zysk'}</h3>
        <div class="amount">${val.price} zł</div>
        <p class="muted">rozliczenie / ${val.billing}</p>
        <div class="note" style="margin:14px 0">Marża bazowa: ${val.margin}%</div>
        <div class="list">
          <div>✔ sklep i koszyk</div>
          <div>✔ auto marża</div>
          <div>✔ plan ${key.toUpperCase()}</div>
        </div>
        <div class="hero-actions">
          <button class="btn btn-primary" onclick="activatePlan('${key}')">Wybierz ${key.toUpperCase()}</button>
        </div>
      </article>`).join('')}
    </section>
  `
});
window.activatePlan = function(plan){
  const meta = qmSubscriptions.activate(plan);
  alert(`Plan ${plan.toUpperCase()} aktywny. Marża ${meta.margin}%`);
  location.href = 'platforma.html';
}

</script>

</body>
</html>
