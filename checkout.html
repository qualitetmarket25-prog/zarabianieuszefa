<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Checkout — UszefaQualitet</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app-layout.css">
  
</head>
<body class="app-page" data-title="Checkout">

<section class="grid cols-2">
  <div class="card">
    <h1>Checkout</h1>
    <form id="checkoutForm" class="grid">
      <input class="input" name="name" placeholder="Imię i nazwisko" required>
      <input class="input" name="email" type="email" placeholder="E-mail" required>
      <input class="input" name="phone" placeholder="Telefon">
      <textarea name="address" placeholder="Adres dostawy"></textarea>
      <button class="btn" type="submit">Złóż zamówienie</button>
    </form>
  </div>
  <div class="card"><h2>Podsumowanie</h2><div id="cartList" class="list"></div><div class="banner" style="margin-top:16px"><strong>Razem</strong><strong data-cart-total>0 zł</strong></div></div>
</section>

<script src="app-shell.js"></script>
</body>
</html>
