<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator sklepu</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:14px;
font-size:18px;
font-weight:bold;
}

.container{
padding:12px;
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:14px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
background:black;
color:white;
}

.store{
padding:10px;
border-bottom:1px solid #eee;
}

.footer-space{
height:80px;
}

</style>
</head>

<body>

<header>
Generator sklepu
</header>

<div class="container">

<div class="card">

Nazwa sklepu

<input id="storeName">

<button onclick="createStore()">
Utwórz sklep
</button>

</div>


<div class="card">

Moje sklepy

<div id="storesBox"></div>

</div>

<div class="footer-space"></div>

</div>


<script>

const KEY_STORES = "qm_stores_v1"
const KEY_ACTIVE = "qm_active_store_v1"


function loadStores(){

let stores =
JSON.parse(localStorage.getItem(KEY_STORES) || "[]")

let box =
document.getElementById("storesBox")

box.innerHTML = ""

stores.forEach((s,i)=>{

let div =
document.createElement("div")

div.className = "store"

div.innerHTML =

s.name +
"<br>" +

"<button onclick='setActive("+i+")'>Aktywuj</button>"

box.appendChild(div)

})

}



function createStore(){

let name =
document.getElementById("storeName").value

if(!name) return

let stores =
JSON.parse(localStorage.getItem(KEY_STORES) || "[]")

let store = {

id: Date.now(),
name: name

}

stores.push(store)

localStorage.setItem(
KEY_STORES,
JSON.stringify(stores)
)

localStorage.setItem(
KEY_ACTIVE,
JSON.stringify(store)
)

document.getElementById("storeName").value=""

loadStores()

}



function setActive(i){

let stores =
JSON.parse(localStorage.getItem(KEY_STORES) || "[]")

let store = stores[i]

localStorage.setItem(
KEY_ACTIVE,
JSON.stringify(store)
)

alert("Aktywny sklep: " + store.name)

}


loadStores()

</script>


<script src="js/config.js"></script>
<script src="js/plan-guard.js"></script>

</body>
</html>
