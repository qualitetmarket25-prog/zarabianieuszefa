<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
color:#111;
}
header{
background:#111;
color:#fff;
padding:14px;
font-size:18px;
font-weight:bold;
}
.container{
max-width:700px;
margin:0 auto;
padding:12px;
}
.card{
background:#fff;
border-radius:12px;
padding:14px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
}
button,
.btn{
display:block;
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
text-align:center;
text-decoration:none;
box-sizing:border-box;
cursor:pointer;
}
.btn-black{
background:#111;
color:#fff;
}
.btn-white{
background:#fff;
color:#111;
border:1px solid #ddd;
}
.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}
.plan-btn{
background:#fff;
color:#111;
border:1px solid #ddd;
}
.plan-btn.active{
background:#111;
color:#fff;
border-color:#111;
}
.small{
font-size:13px;
color:#666;
}
@media (max-width:640px){
.grid{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<header>
Logowanie
</header>

<div class="container">

<div class="card">
<div class="small">Wejdź do systemu i ustaw plan testowy.</div>
</div>

<div class="card">
Email
<input id="email" type="email" placeholder="twoj@email.com">

Hasło
<input id="password" type="password" placeholder="hasło">

<div class="small" style="margin-bottom:10px;">Wybierz plan:</div>

<div class="grid">
<button type="button" class="plan-btn active" data-plan="basic" onclick="setPlan('basic')">BASIC</button>
<button type="button" class="plan-btn" data-plan="pro" onclick="setPlan('pro')">PRO</button>
<button type="button" class="plan-btn" data-plan="elite" onclick="setPlan('elite')">ELITE</button>
</div>

<div style="height:12px;"></div>

<button class="btn-black" onclick="loginUser()">Zaloguj</button>
</div>

<div class="card">
<a href="index.html" class="btn btn-white">Wróć na start</a>
</div>

</div>

<script>
const PLAN_KEY = "qm_plan_v1";
const AUTH_KEY = "qm_auth_v1";
const USER_KEY = "qm_user_v1";
const TOKEN_KEY = "qm_token_v1";

let selectedPlan = "basic";

function setPlan(plan){
  selectedPlan = plan;

  document.querySelectorAll(".plan-btn").forEach(function(btn){
    btn.classList.remove("active");
  });

  const active = document.querySelector('[data-plan="' + plan + '"]');
  if(active) active.classList.add("active");
}

function loginUser(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    alert("Wpisz email i hasło");
    return;
  }

  const user = {
    id: Date.now(),
    email: email,
    plan: selectedPlan
  };

  const auth = {
    email: email,
    plan: selectedPlan,
    loggedIn: true
  };

  const token = "qm_" + Date.now();

  localStorage.setItem(PLAN_KEY, selectedPlan);
  localStorage.setItem(USER_KEY, JSON.stringify(user));
  localStorage.setItem(AUTH_KEY, JSON.stringify(auth));
  localStorage.setItem(TOKEN_KEY, token);

  location.href = "dashboard.html";
}
</script>

<script src="js/config.js"></script>
<script src="js/planGuard.js"></script>

</body>
</html>
