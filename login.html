<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Logowanie — UszefaQualitet</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app-layout.css">
  
</head>
<body class="" data-title="Logowanie">

<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand" style="padding:0 0 18px">
      <img src="uszefaqualitet-logo.svg" alt="logo">
      <div><div class="title">UszefaQualitet</div><div class="sub">wejdź do swojej platformy</div></div>
    </div>
    <h1>Zaloguj się do aplikacji</h1>
    <p class="muted">Po wejściu masz sklep, ogłoszenia, reklamy, AI i kreator własnej aplikacji.</p>
    <form id="loginForm" class="grid" style="margin-top:18px">
      <input class="input" type="email" placeholder="E-mail" required>
      <input class="input" type="password" placeholder="Hasło" required>
      <button class="btn" type="submit">Wejdź do panelu</button>
      <a class="btn-ghost" href="index.html">Wróć na start</a>
    </form>
  </div>
</div>

<script src="app-shell.js"></script>
</body>
</html>
