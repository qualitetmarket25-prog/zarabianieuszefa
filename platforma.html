<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platforma</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
color:#111;
}
header{
background:#111;
color:#fff;
padding:14px;
font-size:18px;
font-weight:bold;
}
.container{
max-width:700px;
margin:0 auto;
padding:12px;
}
.card{
background:#fff;
border-radius:12px;
padding:14px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.title{
font-size:20px;
font-weight:bold;
margin-bottom:8px;
}
.small{
font-size:13px;
color:#666;
}
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}
.btn,
a.btn{
display:block;
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
text-align:center;
text-decoration:none;
box-sizing:border-box;
cursor:pointer;
}
.btn-black{
background:#111;
color:#fff;
}
.btn-white{
background:#fff;
color:#111;
border:1px solid #ddd;
}
.badge{
display:inline-block;
padding:6px 10px;
border-radius:999px;
background:#efefef;
font-size:12px;
font-weight:bold;
margin-top:8px;
}
@media (max-width:640px){
.grid{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<header>
Platforma
</header>

<div class="container">

<div class="card">
<div class="title">Centrum QualitetMarket</div>
<div id="planBox">Plan: BASIC</div>
<div id="storeBox" class="small" style="margin-top:8px;">Aktywny sklep: brak</div>
<span class="badge" id="accessBox">Dostęp podstawowy</span>
</div>

<div class="card">
<div class="grid">
<a href="dashboard.html" class="btn btn-white">Dashboard</a>
<a href="hurtownie.html" class="btn btn-white">Hurtownie</a>
<a href="generator-sklepu.html" class="btn btn-white">Generator sklepu</a>
<a href="sklep.html" class="btn btn-white">Sklep</a>
<a href="koszyk.html" class="btn btn-white">Koszyk</a>
<a href="checkout.html" class="btn btn-white">Checkout</a>
<a href="zamowienia.html" class="btn btn-white">Zamówienia</a>
<a href="intelligence.html" class="btn btn-white">Intelligence</a>
<a href="cennik.html" class="btn btn-white">Cennik</a>
<a href="panel-sklepu.html" class="btn btn-white">Panel sklepu</a>
</div>
</div>

<div class="card">
<a href="index.html" class="btn btn-black">Wróć na start</a>
</div>

</div>

<script>
function safeParse(value, fallback){
  try{
    return JSON.parse(value);
  }catch(e){
    return fallback;
  }
}

function renderInfo(){
  const plan = String(localStorage.getItem("qm_plan_v1") || "basic").toUpperCase();
  const store = safeParse(localStorage.getItem("qm_active_store_v1"), null);

  document.getElementById("planBox").innerText = "Plan: " + plan;
  document.getElementById("storeBox").innerText =
    "Aktywny sklep: " + (store && store.name ? store.name : "brak");

  let access = "Dostęp podstawowy";
  if(plan === "PRO") access = "Dostęp PRO";
  if(plan === "ELITE") access = "Dostęp ELITE";

  document.getElementById("accessBox").innerText = access;
}

renderInfo();
</script>

<script src="js/config.js"></script>
<script src="js/planGuard.js"></script>

</body>
</html>
