<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QualitetMarket — Platforma</title>
<link rel="stylesheet" href="app-layout.css">
</head>
<body>
<script src="app-shell.js"></script>
<script src="auto-margin.js"></script>
<script src="js/subscriptions.js"></script>
<script src="js/planGuard.js"></script>
<script>

const products = qmUtils.read('qm_products_by_supplier_v1',[]);
const orders = qmUtils.read('qm_orders_v1',[]);
const stores = qmUtils.read('qm_stores_v1',[]);
renderShell({
  title:'QualitetMarket — Platforma',
  subtitle:'Panel aplikacji',
  content: `
  <section class="hero">
    <span class="badge">Panel główny</span>
    <h1>Platforma sprzedażowa</h1>
    <p>Tu zarządzasz planem, marżą, sklepem, zamówieniami i hurtowniami.</p>
    <div class="hero-actions">
      <a class="btn btn-primary" href="hurtownie.html">Importuj produkty</a>
      <a class="btn btn-secondary" href="sklep.html">Przejdź do sklepu</a>
      <a class="btn btn-secondary" href="sklepy.html">Zarządzaj sklepami</a>
    </div>
  </section>

  <section class="grid cards">
    <article class="card span-4 kpi"><span class="muted">Plan</span><strong>${qmState.getPlan().toUpperCase()}</strong><span class="muted">Subskrypcja aktywna</span></article>
    <article class="card span-4 kpi"><span class="muted">Marża</span><strong>${qmState.getMargin()}%</strong><span class="muted">Domyślna marża sklepu</span></article>
    <article class="card span-4 kpi"><span class="muted">Produkty / Zamówienia / Sklepy</span><strong>${products.length} / ${orders.length} / ${stores.length}</strong><span class="muted">Stan aplikacji</span></article>
  </section>

  <div class="section-title"><h2>Szybkie akcje</h2></div>
  <section class="module-grid">
    <article class="module"><div class="emoji">🏭</div><h3>Hurtownie</h3><p>Załaduj demo produkty i ustaw katalog.</p><div class="actions"><a class="btn btn-primary" href="hurtownie.html">Otwórz</a></div></article>
    <article class="module"><div class="emoji">🛍️</div><h3>Sklep</h3><p>Sprzedawaj produkty z automatyczną marżą.</p><div class="actions"><a class="btn btn-primary" href="sklep.html">Otwórz sklep</a></div></article>
    <article class="module"><div class="emoji">💸</div><h3>Cennik</h3><p>Zmień plan, by zwiększyć marżę i odblokować funkcje.</p><div class="actions"><a class="btn btn-primary" href="cennik.html">Zmień plan</a></div></article>
  </section>
  `
});

</script>

</body>
</html>
