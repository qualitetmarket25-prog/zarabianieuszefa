<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Panel sklepu – QualitetMarket</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root { color-scheme: dark; }
    .wrap{max-width:980px;margin:42px auto;padding:0 16px}
    .card{
      border-radius:18px;
      padding:20px;
      background:rgba(17,24,39,.82);
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(10px);
      box-shadow: 0 30px 80px rgba(0,0,0,.35);
    }
    .card, .card *{ color:#eaf0ff !important; }
    .muted{ opacity:1 !important; color:rgba(234,240,255,.72) !important; }
    .h{font-size:30px;font-weight:950;margin:0 0 10px}

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

    .btn{
      appearance:none;border:0;border-radius:12px;padding:12px 14px;
      font-weight:950;cursor:pointer;text-decoration:none !important;
      display:inline-flex;align-items:center;justify-content:center;line-height:1;
      transition: transform .12s ease, filter .12s ease;
    }
    .btn:active{ transform: translateY(1px); }
    .btn-primary{ background:#22c55e !important; color:#06110a !important; }
    .btn-ghost{ background:rgba(255,255,255,.10) !important; color:#eaf0ff !important; border:1px solid rgba(255,255,255,.12); }
    .btn-primary:hover, .btn-ghost:hover{ filter:brightness(1.08); }

    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,.10);text-align:left}
    code{background:rgba(255,255,255,.10);padding:2px 6px;border-radius:8px}

    input{
      padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.14);
      width:100%;background:rgba(255,255,255,.92); color:#0b1220 !important;
    }
    input::placeholder{ color:rgba(11,18,32,.55); }

    .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px}
    @media(max-width:860px){.grid{grid-template-columns:1fr}}
    .box{margin-top:14px;padding:12px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10)}
    a{ color:#bfe1ff !important; text-decoration: underline !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="h">Panel sklepu</div>
      <div class="muted">Tu sprzedawca widzi link sklepu i może edytować marżę / nazwę / email.</div>

      <div id="box" class="box"></div>

      <div class="row" style="margin-top:14px">
        <button class="btn btn-primary" id="openShop">Otwórz aktywny sklep</button>
        <a class="btn btn-ghost" href="generator-sklepu.html">Generator sklepów</a>
        <a class="btn btn-ghost" href="platforma.html">Wejście do platformy</a>
      </div>

      <div style="margin-top:16px">
        <div style="font-weight:950">Edytuj aktywny sklep</div>
        <div class="grid">
          <div>
            <div class="muted" style="font-weight:900;margin:8px 0 6px">Nazwa</div>
            <input id="eTitle" placeholder="np. Sklep Szefa">
          </div>
          <div>
            <div class="muted" style="font-weight:900;margin:8px 0 6px">Marża (%)</div>
            <input id="eMargin" type="number" min="0" max="80" step="0.1" placeholder="np. 8">
          </div>
          <div>
            <div class="muted" style="font-weight:900;margin:8px 0 6px">Email</div>
            <input id="eEmail" type="email" placeholder="np. kontakt@twojsklep.pl">
          </div>
        </div>
        <div class="row" style="margin-top:10px">
          <button class="btn btn-primary" id="saveActive">Zapisz zmiany</button>
        </div>
      </div>

      <div id="list" style="margin-top:18px"></div>
    </div>
  </div>

<script>
(() => {
  "use strict";

  const LS_STORES = "qm_stores_v1";
  const LS_ACTIVE = "qm_active_store_v1";
  const LS_MARGIN = "qm_store_margin_pct";

  const $ = (id) => document.getElementById(id);

  const slugify = (s) => String(s || "")
    .trim().toLowerCase()
    .replace(/[ąćęłńóśźż]/g, (m) => ({ "ą":"a","ć":"c","ę":"e","ł":"l","ń":"n","ó":"o","ś":"s","ź":"z","ż":"z" }[m] || m))
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/-+/g, "-")
    .replace(/^-|-$/g, "");

  const readJSON = (k, fallback) => { try { return JSON.parse(localStorage.getItem(k) || ""); } catch { return fallback; } };
  const writeJSON = (k, v) => localStorage.setItem(k, JSON.stringify(v));

  const makeUrl = (slug) => `${location.origin}/zarabianieuszefa/sklep.html?store=${encodeURIComponent(slug)}`;

  const loadMap = () => {
    const reg = readJSON(LS_STORES, {});
    if (reg && typeof reg === "object" && !Array.isArray(reg)) return reg;
    return {};
  };

  const getActiveSlug = () => slugify(localStorage.getItem(LS_ACTIVE) || "");

  const setActive = (slug) => {
    const s = slugify(slug);
    if (!s) return;
    const map = loadMap();
    const e = map[s] || {};
    localStorage.setItem(LS_ACTIVE, s);
    const m01 = (typeof e.marginPct !== "undefined") ? Number(e.marginPct) : 0;
    localStorage.setItem(LS_MARGIN, String(Math.max(0, Math.min(1, isFinite(m01)?m01:0))));
    localStorage.setItem("qm_store_slug", s);
  };

  const render = () => {
    const map = loadMap();
    const slugs = Object.keys(map);
    const active = getActiveSlug() || slugs[0] || "";

    if (!slugs.length) {
      $("box").innerHTML = `Brak sklepów. Wejdź w <a href="generator-sklepu.html">generator</a> i utwórz pierwszy sklep.`;
      $("list").innerHTML = "";
      return;
    }

    if (active && !getActiveSlug()) setActive(active);

    const a = getActiveSlug() || active;
    const e = map[a] || {};
    const title = String(e.title || a.replaceAll("-", " "));
    const m01 = Number(e.marginPct || 0) || 0;
    const mPct = Math.round(m01 * 1000) / 10;
    const url = makeUrl(a);

    $("box").innerHTML = `
      <div><b>Aktywny sklep:</b> ${title} (<code>${a}</code>)</div>
      <div><b>Marża:</b> ${mPct}%</div>
      <div><b>Email:</b> ${String(e.email || "-")}</div>
      <div style="margin-top:8px"><b>Link sklepu:</b> <a href="${url}" target="_blank" rel="noopener">${url}</a></div>
    `;

    $("eTitle").value = title;
    $("eMargin").value = String(mPct);
    $("eEmail").value = String(e.email || "");

    $("list").innerHTML = `
      <div class="muted" style="margin-top:10px">Twoje sklepy:</div>
      <table>
        <thead><tr><th>Sklep</th><th>Slug</th><th>Marża</th><th>Akcja</th></tr></thead>
        <tbody>
          ${slugs.map(s => {
            const x = map[s] || {};
            const t = String(x.title || s.replaceAll("-", " "));
            const mm01 = Number(x.marginPct || 0) || 0;
            const mp = Math.round(mm01 * 1000) / 10;
            return `
              <tr>
                <td><b>${t}</b></td>
                <td><code>${s}</code></td>
                <td>${mp}%</td>
                <td>
                  <button class="btn btn-ghost" data-set="${s}">Ustaw aktywny</button>
                  <a class="btn btn-ghost" href="${makeUrl(s)}" target="_blank">Otwórz</a>
                </td>
              </tr>
            `;
          }).join("")}
        </tbody>
      </table>
    `;

    $("list").querySelectorAll("[data-set]").forEach(btn => {
      btn.addEventListener("click", () => {
        const s = btn.getAttribute("data-set");
        setActive(s);
        render();
      });
    });
  };

  $("saveActive").addEventListener("click", () => {
    const a = getActiveSlug();
    if (!a) return;

    const map = loadMap();
    const cur = map[a] || {};

    const title = String($("eTitle").value || "").trim() || a.replaceAll("-", " ");
    const m = Number(String($("eMargin").value || "0").replace(",", "."));
    const email = String($("eEmail").value || "").trim();

    const m01 = Math.max(0, Math.min(1, (isFinite(m) ? m : 0) / 100));

    map[a] = { ...cur, title, email, marginPct: m01, theme: cur.theme || "default" };
    writeJSON(LS_STORES, map);
    setActive(a);
    render();
  });

  $("openShop").addEventListener("click", () => {
    const a = getActiveSlug();
    if (!a) return location.href = "generator-sklepu.html";
    location.href = `sklep.html?store=${encodeURIComponent(a)}`;
  });

  render();
})();
</script>
</body>
</html>
