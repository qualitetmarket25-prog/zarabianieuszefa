<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Panel sklepu</title>
  <script src="app-shell.js"></script>
  <style>
    .grid { display: grid; grid-template-columns: 1.1fr .9fr; gap: 16px; }
    .card, .preview, .section-item { background: rgba(15,23,42,.9); border: 1px solid rgba(255,255,255,.08); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,.22); }
    .card, .preview { padding: 18px; }
    .card h3, .preview h3 { margin: 0 0 14px; font-size: 18px; }
    .field { display: grid; gap: 8px; margin-bottom: 12px; }
    .field label { font-size: 13px; color: #94a3b8; font-weight: 700; }
    .field input, .field textarea, .field select { width: 100%; padding: 12px 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,.08); background: #0b1220; color: #f8fafc; }
    .field textarea { min-height: 92px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 12px 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,.08); background: #111827; color: #fff; font-weight: 800; cursor: pointer; }
    .btn.primary { background: linear-gradient(135deg,#22c55e,#16a34a); color: #052e16; border-color: transparent; }
    .btn.blue { background: linear-gradient(135deg,#38bdf8,#0ea5e9); color: #082f49; border-color: transparent; }
    .btn.warn { background: linear-gradient(135deg,#ef4444,#dc2626); color: #fee2e2; border-color: transparent; }
    .hero { border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,.08); margin-bottom: 14px; }
    .hero .img { aspect-ratio: 16/6; background: #0b1220 center/cover no-repeat; }
    .hero .body { padding: 16px; background: rgba(255,255,255,.03); }
    .muted { color: #94a3b8; line-height: 1.6; }
    .section-list { display: grid; gap: 10px; margin-top: 12px; }
    .section-item { padding: 14px; }
    .section-item strong { display: block; margin-bottom: 8px; }
    .mini { display:grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 12px; margin-bottom: 16px; }
    .mini-card { padding: 14px; border-radius: 16px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); }
    .mini-card strong { display:block; font-size:22px; margin-bottom: 6px; }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .row, .mini { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div data-page-root>
    <div class="mini">
      <div class="mini-card"><strong id="statProducts">0</strong><span class="muted">Produkty</span></div>
      <div class="mini-card"><strong id="statGallery">0</strong><span class="muted">Zdjęcia</span></div>
      <div class="mini-card"><strong id="statMedia">0</strong><span class="muted">Media pack</span></div>
    </div>

    <section class="grid">
      <div class="card">
        <h3>Ustawienia aktywnego sklepu</h3>
        <div class="field">
          <label for="storeName">Nazwa sklepu</label>
          <input id="storeName" />
        </div>
        <div class="field">
          <label for="storeSlug">Slug sklepu</label>
          <input id="storeSlug" />
        </div>
        <div class="field">
          <label for="storeNiche">Nisza / kategoria</label>
          <input id="storeNiche" />
        </div>
        <div class="field">
          <label for="storeDescription">Opis sklepu</label>
          <textarea id="storeDescription"></textarea>
        </div>
        <div class="row">
          <div class="field">
            <label for="storeLogo">URL logo</label>
            <input id="storeLogo" />
          </div>
          <div class="field">
            <label for="storeHero">URL hero zdjęcia</label>
            <input id="storeHero" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="storeEmail">Email</label>
            <input id="storeEmail" />
          </div>
          <div class="field">
            <label for="storePhone">Telefon</label>
            <input id="storePhone" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="storeWebsite">Link strony</label>
            <input id="storeWebsite" />
          </div>
          <div class="field">
            <label for="storeMargin">Marża %</label>
            <input id="storeMargin" type="number" min="0" value="25" />
          </div>
        </div>
        <div class="row">
          <button class="btn primary" id="saveStoreBtn" type="button">Zapisz sklep</button>
          <button class="btn blue" id="newStoreBtn" type="button">Nowy sklep demo</button>
        </div>

        <h3 style="margin-top:18px;">Sekcje sprzedażowe sklepu</h3>
        <div class="field">
          <label for="sectionTitle">Tytuł sekcji</label>
          <input id="sectionTitle" placeholder="Np. Start od 0 zł" />
        </div>
        <div class="field">
          <label for="sectionText">Opis sekcji</label>
          <textarea id="sectionText" placeholder="Co ma pokazać klientowi ta sekcja"></textarea>
        </div>
        <div class="row">
          <button class="btn" id="addSectionBtn" type="button">Dodaj sekcję</button>
          <button class="btn warn" id="resetSectionsBtn" type="button">Resetuj sekcje</button>
        </div>
      </div>

      <aside class="preview">
        <h3>Podgląd sklepu</h3>
        <div class="hero">
          <div id="previewHero" class="img"></div>
          <div class="body">
            <strong id="previewName">—</strong>
            <div id="previewNiche" class="muted"></div>
            <div id="previewDesc" class="muted" style="margin-top:8px;"></div>
          </div>
        </div>

        <div class="field">
          <label>Aktywny slug</label>
          <input id="activeStoreDisplay" disabled />
        </div>

        <div class="row">
          <a class="btn" href="sklep.html">Otwórz sklep</a>
          <a class="btn" href="gallery.html">Otwórz galerię</a>
        </div>

        <div class="section-list" id="sectionsList"></div>
      </aside>
    </section>
  </div>

  <script>
    QU.shell('Panel sklepu', 'ETAP 9 — zarządzanie marką, galerią i sekcjami');

    function readStore() {
      return QU.getActiveStore();
    }

    function fillForm() {
      var store = readStore();
      document.getElementById('storeName').value = store.name || '';
      document.getElementById('storeSlug').value = store.slug || '';
      document.getElementById('storeNiche').value = store.niche || '';
      document.getElementById('storeDescription').value = store.description || '';
      document.getElementById('storeLogo').value = store.logo || '';
      document.getElementById('storeHero').value = store.heroImage || '';
      document.getElementById('storeEmail').value = store.contactEmail || '';
      document.getElementById('storePhone').value = store.contactPhone || '';
      document.getElementById('storeWebsite').value = store.websiteUrl || '';
      document.getElementById('storeMargin').value = localStorage.getItem(QU.keys.MARGIN_KEY) || '25';
      renderPreview();
    }

    function renderPreview() {
      var store = readStore();
      document.getElementById('previewHero').style.backgroundImage = 'url(' + (store.heroImage || ((store.gallery || [])[0] || {}).url || 'https://images.unsplash.com/photo-1556740749-887f6717d7e4?auto=format&fit=crop&w=1400&q=80') + ')';
      document.getElementById('previewName').textContent = store.name || 'Mój sklep';
      document.getElementById('previewNiche').textContent = store.niche || 'Sklep online';
      document.getElementById('previewDesc').textContent = store.description || 'Opis sklepu.';
      document.getElementById('activeStoreDisplay').value = store.slug || '';
      document.getElementById('statProducts').textContent = String(QU.readProducts().length);
      document.getElementById('statGallery').textContent = String((store.gallery || []).length);
      document.getElementById('statMedia').textContent = String((store.mediaPack || []).length);

      var list = document.getElementById('sectionsList');
      var sections = Array.isArray(store.sections) ? store.sections : [];
      if (!sections.length) {
        list.innerHTML = '<div class="section-item"><strong>Brak sekcji</strong><div class="muted">Dodaj sekcje sprzedażowe dla sklepu.</div></div>';
        return;
      }
      list.innerHTML = sections.map(function (item) {
        return '<div class="section-item"><strong>' + QU.escapeHtml(item.title || 'Sekcja') + '</strong><div class="muted">' + QU.escapeHtml(item.text || '') + '</div><div style="margin-top:10px;"><button class="btn" type="button" data-delete-section="' + QU.escapeHtml(item.id) + '">Usuń</button></div></div>';
      }).join('');
    }

    function saveStore() {
      var current = readStore();
      var next = {
        id: current.id,
        name: document.getElementById('storeName').value.trim() || 'Mój sklep',
        slug: QU.slugify(document.getElementById('storeSlug').value.trim() || document.getElementById('storeName').value.trim() || 'moj-sklep'),
        niche: document.getElementById('storeNiche').value.trim(),
        description: document.getElementById('storeDescription').value.trim(),
        logo: document.getElementById('storeLogo').value.trim(),
        heroImage: document.getElementById('storeHero').value.trim(),
        contactEmail: document.getElementById('storeEmail').value.trim(),
        contactPhone: document.getElementById('storePhone').value.trim(),
        websiteUrl: document.getElementById('storeWebsite').value.trim(),
        gallery: current.gallery || [],
        mediaPack: current.mediaPack || [],
        sections: current.sections || []
      };
      QU.saveStore(Object.assign({}, current, next));
      localStorage.setItem(QU.keys.MARGIN_KEY, String(Number(document.getElementById('storeMargin').value) || 25));
      fillForm();
      alert('Sklep zapisany.');
    }

    function addSection() {
      var title = document.getElementById('sectionTitle').value.trim();
      var text = document.getElementById('sectionText').value.trim();
      if (!title || !text) {
        alert('Podaj tytuł i opis sekcji.');
        return;
      }
      QU.updateActiveStore(function (store) {
        var sections = Array.isArray(store.sections) ? store.sections : [];
        sections.unshift({ id: QU.uid(), title: title, text: text });
        store.sections = sections;
        return store;
      });
      document.getElementById('sectionTitle').value = '';
      document.getElementById('sectionText').value = '';
      renderPreview();
    }

    function createNewDemoStore() {
      var name = 'Sklep ' + new Date().toLocaleDateString('pl-PL');
      var slug = QU.slugify(name);
      var store = QU.saveStore({
        id: QU.uid(),
        slug: slug,
        name: name,
        niche: 'Nowy sklep demo',
        description: 'Sklep testowy przygotowany pod dalszy rozwój.',
        heroImage: '',
        logo: '',
        contactEmail: '',
        contactPhone: '',
        websiteUrl: '',
        gallery: [],
        mediaPack: [],
        sections: [
          { id: QU.uid(), title: 'Gotowy start', text: 'Masz bazę pod sprzedaż bez wkładu pieniężnego.' }
        ]
      });
      localStorage.setItem(QU.keys.ACTIVE_STORE_KEY, store.slug);
      fillForm();
      alert('Utworzono nowy sklep demo.');
    }

    document.getElementById('saveStoreBtn').addEventListener('click', saveStore);
    document.getElementById('newStoreBtn').addEventListener('click', createNewDemoStore);
    document.getElementById('addSectionBtn').addEventListener('click', addSection);
    document.getElementById('resetSectionsBtn').addEventListener('click', function () {
      if (!confirm('Zresetować sekcje aktywnego sklepu?')) return;
      QU.updateActiveStore(function (store) {
        store.sections = [];
        return store;
      });
      renderPreview();
    });

    document.addEventListener('click', function (event) {
      var btn = event.target.closest('[data-delete-section]');
      if (!btn) return;
      var id = btn.getAttribute('data-delete-section');
      QU.updateActiveStore(function (store) {
        store.sections = (store.sections || []).filter(function (item) { return item.id !== id; });
        return store;
      });
      renderPreview();
    });

    QU.ensureSeedStore && QU.ensureSeedStore();
    fillForm();
  </script>
</body>
</html>
