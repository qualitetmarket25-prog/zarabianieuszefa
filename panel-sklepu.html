<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel sklepu | QualitetMarket</title>
<link rel="stylesheet" href="styles.css">

</head>
<body>
<header class="topbar"><div class="container topbar-inner"><a class="brand" href="index.html"><span class="brand-badge">QM</span><span>QualitetMarket</span></a><nav class="nav"><a href="index.html" class="">Start</a><a href="dashboard.html" class="">Dashboard</a><a href="hurtownie.html" class="">Hurtownie</a><a href="sklep.html" class="">Sklep</a><a href="koszyk.html" class="">Koszyk</a><a href="zamowienia.html" class="">Zamówienia</a><a href="panel-sklepu.html" class="active">Panel sklepu</a><a href="cennik.html" class="">Cennik</a></nav><div class="store-pill">Plan: <strong data-current-plan>basic</strong></div></div></header>

<section class="section"><div class="container grid cols-2"><div class="card pad"><h2>Ustawienia sklepu</h2><form class="form" id="store-settings-form"><label>Nazwa sklepu<input class="input" name="name" placeholder="Mój sklep"></label><label>Slug sklepu<input class="input" name="slug" placeholder="moj-sklep"></label><label>Opis sklepu<textarea name="description" placeholder="Krótki opis sklepu"></textarea></label><label>Marża %<input class="input" type="number" name="margin" min="0" max="500" value="20"></label><button class="btn primary" type="submit">Zapisz ustawienia</button></form></div><div class="card pad"><h3>Aktywny sklep</h3><div id="store-preview" class="list"></div></div></div></section>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const form=document.getElementById('store-settings-form'); const preview=document.getElementById('store-preview');
  function render(){ const stores=QM.getStores(); const slug=QM.getActiveStoreSlug(); const store=stores.find(s=>s.slug===slug)||stores[0]; preview.innerHTML=`<div class="list-item"><span>Nazwa</span><strong>${store?.name||'Brak'}</strong></div><div class="list-item"><span>Slug</span><strong>${store?.slug||'Brak'}</strong></div><div class="list-item"><span>Marża</span><strong>${QM.getStoreMargin()}%</strong></div>`; if(store){ form.name.value=store.name||''; form.slug.value=store.slug||''; form.description.value=store.description||''; form.margin.value=QM.getStoreMargin(); }}
  form.addEventListener('submit',e=>{e.preventDefault(); const fd=new FormData(form); const name=fd.get('name')||'Mój sklep'; const slug=QM.slugify(fd.get('slug')||name); const stores=QM.getStores(); const idx=stores.findIndex(s=>s.slug===QM.getActiveStoreSlug()); const next={id:'store-'+Date.now(),name,slug,description:fd.get('description')||'',marginPct:Number(fd.get('margin')||20)}; if(idx>=0)stores[idx]=next; else stores.push(next); QM.setStores(stores); QM.setActiveStoreSlug(slug); QM.setStoreMargin(next.marginPct); render(); alert('Zapisano ustawienia sklepu');});
  render();
});
</script>

<footer class="footer"><div class="container">QualitetMarket clean build v2 • GitHub Pages safe • mobile first</div></footer>
<script src="js/config.js"></script>
<script src="js/planGuard.js"></script>

</body></html>
