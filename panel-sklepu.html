<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Panel sklepu – QualitetMarket</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .wrap{max-width:980px;margin:42px auto;padding:0 16px}
    .card{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:16px;padding:18px}
    .h{font-size:26px;font-weight:900;margin:0 0 10px}
    .muted{opacity:.7}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .btn{appearance:none;border:0;border-radius:12px;padding:12px 14px;font-weight:900;cursor:pointer}
    .btn-primary{background:#22c55e;color:#06110a}
    .btn-ghost{background:rgba(0,0,0,.06)}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{padding:10px;border-bottom:1px solid rgba(0,0,0,.08);text-align:left}
    code{background:rgba(0,0,0,.06);padding:2px 6px;border-radius:8px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="h">Panel sklepu</div>
      <div class="muted">MVP: zarządzanie sklepami w rejestrze <code>qm_stores_v1</code> + aktywny sklep.</div>

      <div id="box" style="margin-top:14px"></div>

      <div class="row" style="margin-top:14px">
        <button class="btn btn-primary" id="openShop">Otwórz aktywny sklep</button>
        <button class="btn btn-ghost" id="openGen">Generator sklepów</button>
        <a class="btn btn-ghost" href="sklep.html" style="text-decoration:none;display:inline-block">Sklep główny</a>
      </div>

      <div id="list" style="margin-top:18px"></div>
    </div>
  </div>

<script>
(() => {
  "use strict";

  const LS_STORES = "qm_stores_v1";
  const LS_ACTIVE = "qm_active_store_v1";
  const LS_MARGIN = "qm_store_margin_pct";

  const $ = (id) => document.getElementById(id);

  const slugify = (s) => String(s || "")
    .trim()
    .toLowerCase()
    .replace(/[ąćęłńóśźż]/g, (m) => ({ "ą":"a","ć":"c","ę":"e","ł":"l","ń":"n","ó":"o","ś":"s","ź":"z","ż":"z" }[m] || m))
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/-+/g, "-")
    .replace(/^-|-$/g, "");

  const readJSON = (k, fallback) => {
    try { return JSON.parse(localStorage.getItem(k) || ""); } catch { return fallback; }
  };

  const makeUrl = (slug) => `${location.origin}/zarabianieuszefa/sklep.html?store=${encodeURIComponent(slug)}`;

  const loadMap = () => {
    const reg = readJSON(LS_STORES, {});
    if (reg && typeof reg === "object" && !Array.isArray(reg)) return reg;
    return {};
  };

  const getActiveSlug = () => slugify(localStorage.getItem(LS_ACTIVE) || "");

  const setActive = (slug) => {
    const s = slugify(slug);
    if (!s) return;
    const map = loadMap();
    const e = map[s];
    localStorage.setItem(LS_ACTIVE, s);
    const m = (e && typeof e.marginPct !== "undefined") ? Number(e.marginPct) : 0;
    localStorage.setItem(LS_MARGIN, String(Math.max(0, Math.min(1, isFinite(m)?m:0))));
    localStorage.setItem("qm_store_slug", s);
  };

  const render = () => {
    const map = loadMap();
    const slugs = Object.keys(map);
    const active = getActiveSlug() || slugs[0] || "";

    if (!slugs.length) {
      $("box").innerHTML = `Brak sklepów. Wejdź w <a href="generator-sklepu.html">generator</a> i utwórz pierwszy sklep.`;
      $("list").innerHTML = "";
      return;
    }

    if (active && !getActiveSlug()) setActive(active);

    const a = getActiveSlug() || active;
    const e = map[a] || {};
    const title = String(e.title || a.replaceAll("-", " "));
    const marginPct01 = Number(e.marginPct || 0) || 0;
    const marginPct = Math.round(marginPct01 * 1000) / 10; // 1 miejsce po przecinku
    const url = makeUrl(a);

    $("box").innerHTML = `
      <div><b>Aktywny sklep:</b> ${title} (<code>${a}</code>)</div>
      <div><b>Marża:</b> ${marginPct}%</div>
      <div><b>Email:</b> ${String(e.email || "-")}</div>
      <div style="margin-top:8px">Link: <a href="${url}" target="_blank" rel="noopener">${url}</a></div>
    `;

    $("list").innerHTML = `
      <div class="muted" style="margin-top:10px">Twoje sklepy:</div>
      <table>
        <thead><tr><th>Sklep</th><th>Slug</th><th>Marża</th><th>Akcja</th></tr></thead>
        <tbody>
          ${slugs.map(s => {
            const x = map[s] || {};
            const t = String(x.title || s.replaceAll("-", " "));
            const m01 = Number(x.marginPct || 0) || 0;
            const mp = Math.round(m01 * 1000) / 10;
            return `
              <tr>
                <td><b>${t}</b></td>
                <td><code>${s}</code></td>
                <td>${mp}%</td>
                <td>
                  <button class="btn btn-ghost" data-set="${s}">Ustaw aktywny</button>
                  <a class="btn btn-ghost" style="display:inline-block;text-decoration:none" href="${makeUrl(s)}" target="_blank">Otwórz</a>
                </td>
              </tr>
            `;
          }).join("")}
        </tbody>
      </table>
    `;

    $("list").querySelectorAll("[data-set]").forEach(btn => {
      btn.addEventListener("click", () => {
        const s = btn.getAttribute("data-set");
        setActive(s);
        render();
      });
    });
  };

  $("openShop").addEventListener("click", () => {
    const a = getActiveSlug();
    if (!a) return location.href = "generator-sklepu.html";
    location.href = `sklep.html?store=${encodeURIComponent(a)}`;
  });

  $("openGen").addEventListener("click", () => location.href = "generator-sklepu.html");

  render();
})();
</script>
</body>
</html>
