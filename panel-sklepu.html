<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Panel sklepu – QualitetMarket</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .wrap{max-width:980px;margin:42px auto;padding:0 16px}
    .card{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:16px;padding:18px}
    .h{font-size:26px;font-weight:900;margin:0 0 10px}
    .muted{opacity:.7}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .btn{appearance:none;border:0;border-radius:12px;padding:12px 14px;font-weight:900;cursor:pointer}
    .btn-primary{background:#22c55e;color:#06110a}
    .btn-ghost{background:rgba(0,0,0,.06)}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{padding:10px;border-bottom:1px solid rgba(0,0,0,.08);text-align:left}
    code{background:rgba(0,0,0,.06);padding:2px 6px;border-radius:8px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="h">Panel sklepu</div>
      <div class="muted">MVP: rejestr sklepów + aktywny sklep. Tu masz link i szybkie akcje.</div>

      <div id="box" style="margin-top:14px"></div>

      <div class="row" style="margin-top:14px">
        <button class="btn btn-primary" id="openShop">Otwórz sklep</button>
        <button class="btn btn-ghost" id="openGen">Generator sklepów</button>
        <button class="btn btn-ghost" id="switch">Zmień aktywny sklep</button>
      </div>

      <div id="list" style="margin-top:18px"></div>
    </div>
  </div>

<script>
(() => {
  "use strict";

  const LS_STORES = "qm_stores_v1";
  const LS_ACTIVE = "qm_active_store_v1";
  const LS_MARGIN = "qm_store_margin_pct";

  const $ = (id) => document.getElementById(id);

  const loadStores = () => {
    try { return JSON.parse(localStorage.getItem(LS_STORES) || "[]"); }
    catch { return []; }
  };

  const activeSlug = () => (localStorage.getItem(LS_ACTIVE) || "").trim();

  const makeUrl = (slug) => `${location.origin}/zarabianieuszefa/sklep.html?store=${encodeURIComponent(slug)}`;

  const setActive = (slug, marginPct) => {
    localStorage.setItem(LS_ACTIVE, slug);
    localStorage.setItem(LS_MARGIN, String((marginPct || 0)/100));
  };

  const render = () => {
    const stores = loadStores();
    const slug = activeSlug() || stores[0]?.slug || "";
    const store = stores.find(s => s.slug === slug);

    if (!store) {
      $("box").innerHTML = `Brak sklepów. Wejdź w <a href="generator-sklepu.html">generator</a> i utwórz pierwszy sklep.`;
      $("list").innerHTML = "";
      return;
    }

    const url = makeUrl(store.slug);
    $("box").innerHTML = `
      <div><b>Aktywny sklep:</b> ${store.title} (<code>${store.slug}</code>)</div>
      <div><b>Marża:</b> ${store.marginPct}%</div>
      <div><b>Email:</b> ${store.email || "-"}</div>
      <div style="margin-top:8px">Link: <a href="${url}" target="_blank" rel="noopener">${url}</a></div>
    `;

    $("list").innerHTML = `
      <div style="margin-top:10px" class="muted">Twoje sklepy:</div>
      <table>
        <thead><tr><th>Sklep</th><th>Slug</th><th>Marża</th><th>Akcja</th></tr></thead>
        <tbody>
          ${stores.map(s => `
            <tr>
              <td><b>${s.title}</b></td>
              <td><code>${s.slug}</code></td>
              <td>${s.marginPct}%</td>
              <td>
                <button class="btn btn-ghost" data-set="${s.slug}">Ustaw aktywny</button>
                <a class="btn btn-ghost" style="display:inline-block;text-decoration:none" href="${makeUrl(s.slug)}" target="_blank">Otwórz</a>
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;

    $("list").querySelectorAll("[data-set]").forEach(btn => {
      btn.addEventListener("click", () => {
        const target = btn.getAttribute("data-set");
        const st = stores.find(x => x.slug === target);
        setActive(st.slug, st.marginPct);
        render();
      });
    });
  };

  $("openShop").addEventListener("click", () => {
    const stores = loadStores();
    const slug = activeSlug() || stores[0]?.slug || "";
    if (!slug) return location.href = "generator-sklepu.html";
    location.href = `sklep.html?store=${encodeURIComponent(slug)}`;
  });

  $("openGen").addEventListener("click", () => location.href = "generator-sklepu.html");

  $("switch").addEventListener("click", () => {
    const stores = loadStores();
    if (!stores.length) return location.href = "generator-sklepu.html";
    alert("Kliknij 'Ustaw aktywny' przy wybranym sklepie w tabeli.");
  });

  render();
})();
</script>
</body>
</html>
