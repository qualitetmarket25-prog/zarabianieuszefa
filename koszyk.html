<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QualitetMarket — Koszyk</title>
<link rel="stylesheet" href="app-layout.css">
</head>
<body>
<script src="app-shell.js"></script>
<script src="auto-margin.js"></script>
<script src="js/subscriptions.js"></script>
<script src="js/planGuard.js"></script>
<script>

function readCart(){ return qmUtils.read('qm_cart_v1',[]); }
function writeCart(cart){ qmUtils.write('qm_cart_v1', cart); }
function total(cart){ return cart.reduce((s,i)=>s + Number(i.price)*Number(i.qty), 0); }

renderShell({
  title:'QualitetMarket — Koszyk',
  subtitle:'Twój koszyk',
  content: `
    <section class="hero">
      <span class="badge">Koszyk</span>
      <h1>Gotowe do checkoutu</h1>
      <p>Edytuj ilości i przejdź dalej. Wszystko działa też na telefonie.</p>
      <div class="hero-actions">
        <a class="btn btn-secondary" href="sklep.html">Wróć do sklepu</a>
        <a class="btn btn-primary" href="checkout.html">Przejdź do checkoutu</a>
      </div>
    </section>
    <div id="cartList" class="list"></div>
    <div id="cartSummary" class="card" style="margin-top:16px"></div>
  `
});

window.cartPlus = function(id){
  const cart = readCart(); const item = cart.find(x=>x.id===id); if(item) item.qty += 1; writeCart(cart); renderCart();
}
window.cartMinus = function(id){
  let cart = readCart(); const item = cart.find(x=>x.id===id); if(item) item.qty -= 1; cart = cart.filter(x=>x.qty > 0); writeCart(cart); renderCart();
}
window.cartRemove = function(id){
  let cart = readCart().filter(x=>x.id!==id); writeCart(cart); renderCart();
}

function renderCart(){
  const cart = readCart();
  const list = document.getElementById('cartList');
  const summary = document.getElementById('cartSummary');
  if(!cart.length){
    list.innerHTML = `<div class="empty">Koszyk jest pusty.</div>`;
    summary.innerHTML = `<strong>Razem: 0.00 zł</strong>`;
    return;
  }
  list.innerHTML = cart.map(p=>`
    <article class="list-item">
      <div class="meta">
        <img class="thumb" src="${p.img || 'uszefaqualitet-logo.svg'}" alt="">
        <div><strong>${p.name}</strong><div class="muted">${qmUtils.money(p.price)} / szt.</div></div>
      </div>
      <div class="row">
        <button class="btn" onclick="cartMinus('${p.id}')">−</button>
        <div class="btn">${p.qty}</div>
        <button class="btn" onclick="cartPlus('${p.id}')">+</button>
        <button class="btn btn-danger" onclick="cartRemove('${p.id}')">Usuń</button>
      </div>
    </article>
  `).join('');
  summary.innerHTML = `<div class="row" style="justify-content:space-between;align-items:center"><strong>Razem: ${qmUtils.money(total(cart))}</strong><a class="btn btn-primary" href="checkout.html">Dalej</a></div>`;
}
renderCart();

</script>

</body>
</html>
