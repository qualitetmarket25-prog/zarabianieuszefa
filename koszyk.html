<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koszyk</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  color:#111;
}
header{
  background:#111;
  color:#fff;
  padding:14px;
  font-size:18px;
  font-weight:bold;
}
.container{
  max-width:700px;
  margin:0 auto;
  padding:12px;
}
.card{
  background:#fff;
  border-radius:12px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.item{
  border:1px solid #eee;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}
.item-title{
  font-size:17px;
  font-weight:bold;
  margin-bottom:6px;
}
.row{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}
.qty-box{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:10px;
}
.qty-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}
.qty-number{
  min-width:24px;
  text-align:center;
  font-size:16px;
  font-weight:bold;
}
button,
.btn{
  display:block;
  width:100%;
  border:none;
  border-radius:10px;
  padding:14px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
  text-align:center;
  box-sizing:border-box;
}
.btn-black{
  background:#111;
  color:#fff;
}
.btn-white{
  background:#fff;
  color:#111;
  border:1px solid #ddd;
}
.btn-red{
  background:#d93025;
  color:#fff;
}
.small{
  font-size:13px;
  color:#666;
}
.price{
  font-size:18px;
  font-weight:bold;
  margin-top:8px;
}
.summary-line{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-bottom:8px;
  font-size:15px;
}
.summary-total{
  font-size:20px;
  font-weight:bold;
  margin-top:12px;
}
.empty{
  text-align:center;
  color:#666;
  padding:25px 10px;
}
.footer-space{
  height:120px;
}
.sticky-bar{
  position:fixed;
  left:12px;
  right:12px;
  bottom:12px;
  z-index:9999;
}
.sticky-inner{
  background:#111;
  color:#fff;
  border-radius:14px;
  padding:12px;
  box-shadow:0 12px 30px rgba(0,0,0,0.25);
}
.sticky-total{
  font-size:16px;
  margin-bottom:10px;
  font-weight:bold;
}
.top-actions{
  display:flex;
  gap:10px;
}
.top-actions a,
.top-actions button{
  flex:1;
}
@media (min-width:768px){
  .sticky-bar{
    max-width:700px;
    left:50%;
    transform:translateX(-50%);
  }
}
</style>
</head>
<body>

<header>
Koszyk
</header>

<div class="container">

  <div class="card">
    <div id="storeNameBox">Aktywny sklep: —</div>
    <div class="small" id="itemsInfo">Produkty w koszyku: 0</div>
  </div>

  <div class="card">
    <div class="top-actions">
      <a href="sklep.html" class="btn btn-white">Wróć do sklepu</a>
      <a href="zamowienia.html" class="btn btn-white">Zamówienia</a>
    </div>
  </div>

  <div class="card">
    <div id="cartBox"></div>
  </div>

  <div class="card">
    <div class="summary-line">
      <span>Liczba sztuk</span>
      <span id="summaryQty">0</span>
    </div>
    <div class="summary-line">
      <span>Wartość</span>
      <span id="summaryValue">0.00 zł</span>
    </div>
    <div class="summary-total" id="summaryTotal">
      Razem: 0.00 zł
    </div>
  </div>

  <div class="footer-space"></div>

</div>

<div class="sticky-bar">
  <div class="sticky-inner">
    <div class="sticky-total" id="stickyTotal">Razem: 0.00 zł</div>
    <a href="checkout.html" class="btn btn-white">Przejdź do checkout</a>
  </div>
</div>

<script>
const KEY_CART = "qm_cart_v1";
const KEY_ACTIVE_STORE = "qm_active_store_v1";

function safeParse(value, fallback){
  try{
    return JSON.parse(value);
  }catch(e){
    return fallback;
  }
}

function getActiveStore(){
  return safeParse(localStorage.getItem(KEY_ACTIVE_STORE), null);
}

function getAllCart(){
  return safeParse(localStorage.getItem(KEY_CART), []);
}

function saveAllCart(cart){
  localStorage.setItem(KEY_CART, JSON.stringify(cart));
}

function formatPrice(value){
  return Number(value || 0).toFixed(2) + " zł";
}

function getStoreCart(){
  const activeStore = getActiveStore();
  const all = getAllCart();

  if(!activeStore) return [];

  return all.filter(function(item){
    return String(item.storeId) === String(activeStore.id);
  });
}

function setStoreName(){
  const activeStore = getActiveStore();
  document.getElementById("storeNameBox").innerText =
    "Aktywny sklep: " + (activeStore && activeStore.name ? activeStore.name : "brak");
}

function changeQty(productId, delta){
  const activeStore = getActiveStore();
  const all = getAllCart();

  const item = all.find(function(row){
    return String(row.storeId) === String(activeStore.id) &&
           String(row.productId) === String(productId);
  });

  if(!item) return;

  item.qty = Number(item.qty || 0) + delta;

  const cleaned = all.filter(function(row){
    return Number(row.qty || 0) > 0;
  });

  saveAllCart(cleaned);
  renderCart();
}

function removeItem(productId){
  const activeStore = getActiveStore();
  const all = getAllCart();

  const filtered = all.filter(function(row){
    return !(
      String(row.storeId) === String(activeStore.id) &&
      String(row.productId) === String(productId)
    );
  });

  saveAllCart(filtered);
  renderCart();
}

function clearStoreCart(){
  const activeStore = getActiveStore();
  const all = getAllCart();

  const filtered = all.filter(function(row){
    return String(row.storeId) !== String(activeStore.id);
  });

  saveAllCart(filtered);
  renderCart();
}

function renderSummary(cart){
  const qty = cart.reduce(function(sum,item){
    return sum + Number(item.qty || 0);
  }, 0);

  const value = cart.reduce(function(sum,item){
    return sum + (Number(item.price || 0) * Number(item.qty || 0));
  }, 0);

  document.getElementById("summaryQty").innerText = qty;
  document.getElementById("summaryValue").innerText = formatPrice(value);
  document.getElementById("summaryTotal").innerText = "Razem: " + formatPrice(value);
  document.getElementById("stickyTotal").innerText = "Razem: " + formatPrice(value);
  document.getElementById("itemsInfo").innerText = "Produkty w koszyku: " + qty;
}

function renderCart(){
  setStoreName();

  const box = document.getElementById("cartBox");
  const cart = getStoreCart();

  if(!cart.length){
    box.innerHTML =
      '<div class="empty">Koszyk jest pusty.</div>' +
      '<div style="margin-top:12px;"><a href="sklep.html" class="btn btn-black">Idź do sklepu</a></div>';
    renderSummary([]);
    return;
  }

  box.innerHTML = "";

  cart.forEach(function(item){
    const total = Number(item.price || 0) * Number(item.qty || 0);

    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML =
      '<div class="item-title">' + (item.name || "Produkt") + '</div>' +
      '<div class="small">Sklep: ' + (item.storeName || "—") + '</div>' +
      '<div class="price">' + formatPrice(item.price) + ' / szt.</div>' +
      '<div class="qty-box">' +
        '<button class="qty-btn" data-action="minus">-</button>' +
        '<div class="qty-number">' + Number(item.qty || 0) + '</div>' +
        '<button class="qty-btn" data-action="plus">+</button>' +
      '</div>' +
      '<div class="price">Suma: ' + formatPrice(total) + '</div>' +
      '<div style="margin-top:10px;">' +
        '<button class="btn-red" data-action="remove">Usuń</button>' +
      '</div>';

    const buttons = div.querySelectorAll("button");

    buttons.forEach(function(btn){
      btn.addEventListener("click", function(){
        const action = btn.getAttribute("data-action");

        if(action === "minus") changeQty(item.productId, -1);
        if(action === "plus") changeQty(item.productId, 1);
        if(action === "remove") removeItem(item.productId);
      });
    });

    box.appendChild(div);
  });

  const tools = document.createElement("div");
  tools.style.marginTop = "12px";
  tools.innerHTML =
    '<button class="btn-black" id="clearCartBtn">Wyczyść koszyk tego sklepu</button>';

  box.appendChild(tools);

  document.getElementById("clearCartBtn").addEventListener("click", function(){
    clearStoreCart();
  });

  renderSummary(cart);
}

renderCart();
</script>

<script src="js/config.js"></script>
<script src="js/plan-guard.js"></script>

</body>
</html>
