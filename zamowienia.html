<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zamówienia – QualitetMarket</title>

  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="./shop.css" />

  <script defer src="./js/shopCart.js"></script>
  <script defer src="./js/orders.js"></script>

  <style>
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    @media (max-width:980px){.kpi-grid{grid-template-columns:1fr 1fr}}
    .kpi{border:1px solid rgba(0,0,0,.08);border-radius:14px;background:#fff;padding:12px}
    .kpi .label{opacity:.7;font-size:12px}
    .kpi .val{font-size:20px;font-weight:900;margin-top:4px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
    .table{width:100%;border-collapse:collapse}
    .table th,.table td{border-bottom:1px solid rgba(0,0,0,.08);padding:10px 8px;text-align:left;font-size:13px;vertical-align:top}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
    .right{text-align:right}
    .row-actions{display:flex;gap:8px;flex-wrap:wrap}
    .badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;border:1px solid rgba(0,0,0,.12);font-size:12px}
  </style>
</head>

<body data-noShell="1">
  <div class="wrap">
    <div class="hero-card">
      <div class="shop-top">
        <div>
          <h1 class="h1">Zamówienia (MVP)</h1>
          <p class="p">KPI: obrót, prowizja platformy (2%), marża sprzedawcy, rozbicie per hurtownia.</p>
        </div>
        <div class="shop-actions">
          <a class="btn btn-sm" href="./platforma.html">Platforma</a>
          <a class="btn btn-sm" href="./panel-sklepu.html">Panel sklepu</a>
          <a class="btn btn-sm" id="goShop" href="./sklep.html">Sklep</a>
          <a class="btn btn-sm" id="goCart" href="./koszyk.html">Koszyk</a>
          <button class="btn btn-danger btn-sm" id="clearOrders" type="button">Wyczyść zamówienia</button>
        </div>
      </div>

      <div class="hr"></div>

      <div class="toolbar">
        <div class="field" style="min-width:240px;flex:1">
          <label style="opacity:.75;font-size:12px">Filtr: sklep (slug)</label>
          <input class="input" id="storeFilter" placeholder="np. szef / masarnia24 / default" />
        </div>

        <div class="field" style="min-width:220px">
          <label style="opacity:.75;font-size:12px">Szukaj (id/supplier)</label>
          <input class="input" id="q" placeholder="np. ord_ / hurtownia" />
        </div>

        <div class="field" style="min-width:220px">
          <label style="opacity:.75;font-size:12px">Eksport</label>
          <div class="row-actions">
            <button class="btn btn-sm" id="exportJson" type="button">JSON</button>
            <button class="btn btn-sm" id="exportCsv" type="button">CSV</button>
          </div>
        </div>
      </div>

      <div style="height:12px"></div>

      <div class="kpi-grid">
        <div class="kpi">
          <div class="label">Zamówienia</div>
          <div class="val" id="kpiOrders">0</div>
        </div>
        <div class="kpi">
          <div class="label">Obrót brutto</div>
          <div class="val" id="kpiGross">0 zł</div>
        </div>
        <div class="kpi">
          <div class="label">Prowizja platformy (2%)</div>
          <div class="val" id="kpiFee">0 zł</div>
        </div>
        <div class="kpi">
          <div class="label">Marża sprzedawcy (MVP)</div>
          <div class="val" id="kpiMargin">0 zł</div>
        </div>
      </div>

      <div style="height:14px"></div>

      <div class="card soft">
        <div class="row-actions" style="justify-content:space-between;align-items:center">
          <div>
            <strong>Lista zamówień</strong>
            <span class="badge" id="activeStoreBadge" style="margin-left:8px">store: —</span>
          </div>
          <button class="btn btn-primary btn-sm" id="refresh" type="button">Odśwież</button>
        </div>

        <div style="height:10px"></div>

        <div style="overflow:auto">
          <table class="table">
            <thead>
              <tr>
                <th>Data</th>
                <th>ID</th>
                <th>Sklep</th>
                <th>Tryb</th>
                <th class="right">Szt.</th>
                <th class="right">Brutto</th>
                <th class="right">Fee</th>
                <th>Hurtownie</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

<script>
(() => {
  "use strict";

  const $ = (s, r=document) => r.querySelector(s);

  const Orders = window.QM_ORDERS;

  const storeFromUrlOrActive = () => {
    try {
      const u = new URL(location.href);
      const s = (u.searchParams.get("store") || "").trim();
      if (s) return s;
    } catch {}
    try {
      return window.QM_SHOP?.Cart?.getStore?.() || (localStorage.getItem("qm_active_store_v1") || "default");
    } catch {
      return "default";
    }
  };

  const setShopLinks = () => {
    const store = storeFromUrlOrActive();
    $("#activeStoreBadge").textContent = `store: ${store}`;
    $("#goShop").href = `./sklep.html?store=${encodeURIComponent(store)}`;
    $("#goCart").href = `./koszyk.html?store=${encodeURIComponent(store)}`;
    // prefill filter
    const f = $("#storeFilter");
    if (f && !f.value) f.value = store;
  };

  const fmt = (n) => Orders.fmtMoney(n);

  const applyFilters = (list) => {
    const store = ($("#storeFilter").value || "").trim();
    const q = ($("#q").value || "").trim().toLowerCase();

    return list.filter(o => {
      if (!o) return false;
      if (store && String(o.storeSlug || "").toLowerCase() !== store.toLowerCase()) return false;
      if (q) {
        const s = JSON.stringify({ id:o.id, store:o.storeSlug, suppliers:o.supplierBreakdown, meta:o.meta }).toLowerCase();
        if (!s.includes(q)) return false;
      }
      return true;
    });
  };

  const render = () => {
    const all = Orders.list();
    const list = applyFilters(all);

    // KPI
    const sumGross = list.reduce((a,o)=>a + (Number(o?.totals?.gross)||0), 0);
    const sumFee = list.reduce((a,o)=>a + (Number(o?.fees?.platformFeeGross)||0), 0);
    const sumMargin = list.reduce((a,o)=>a + (Number(o?.fees?.sellerMarginGross)||0), 0);

    $("#kpiOrders").textContent = String(list.length);
    $("#kpiGross").textContent = fmt(sumGross);
    $("#kpiFee").textContent = fmt(sumFee);
    $("#kpiMargin").textContent = fmt(sumMargin);

    // rows
    const tbody = $("#rows");
    tbody.innerHTML = "";

    if (!list.length) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td colspan="9" style="opacity:.7">Brak zamówień (albo filtr je ukrywa). Zapis pojawi się po wysłaniu zamówienia z koszyka.</td>`;
      tbody.appendChild(tr);
      return;
    }

    for (const o of list) {
      const dt = o.createdAt ? new Date(o.createdAt) : null;
      const dts = dt ? dt.toLocaleString("pl-PL") : "—";
      const suppliers = (o.supplierBreakdown || [])
        .slice(0, 3)
        .map(x => `${x.supplier}: ${fmt(x.gross)}`)
        .join("<br>");
      const more = (o.supplierBreakdown || []).length > 3 ? `<br><span style="opacity:.7">+${(o.supplierBreakdown.length-3)} więcej</span>` : "";

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${dts}</td>
        <td class="mono">${o.id || "—"}</td>
        <td>${o.storeSlug || "—"}</td>
        <td>${(o.totals?.mode || "—").toUpperCase()}</td>
        <td class="right">${Number(o.totals?.items || 0)}</td>
        <td class="right"><strong>${fmt(o.totals?.gross || 0)}</strong></td>
        <td class="right">${fmt(o.fees?.platformFeeGross || 0)}</td>
        <td>${suppliers}${more}</td>
        <td class="right">
          <div class="row-actions" style="justify-content:flex-end">
            <button class="btn btn-sm" data-json="${o.id}">JSON</button>
            <button class="btn btn-danger btn-sm" data-del="${o.id}">Usuń</button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    }

    tbody.querySelectorAll("[data-del]").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-del");
        Orders.remove(id);
        render();
      });
    });

    tbody.querySelectorAll("[data-json]").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-json");
        const o = Orders.list().find(x => x && x.id === id);
        if (!o) return;
        const blob = new Blob([JSON.stringify(o, null, 2)], { type:"application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${id}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
      });
    });
  };

  const exportJSON = () => {
    const list = applyFilters(Orders.list());
    const blob = new Blob([JSON.stringify(list, null, 2)], { type:"application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `qm_orders_export.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const exportCSV = () => {
    const list = applyFilters(Orders.list());
    const head = ["createdAt","id","storeSlug","mode","items","gross","platformFeeGross","sellerMarginGross","suppliers"];
    const rows = list.map(o => {
      const sups = (o.supplierBreakdown || []).map(s => `${s.supplier}:${Number(s.gross||0).toFixed(2)}`).join("|");
      return [
        o.createdAt || "",
        o.id || "",
        o.storeSlug || "",
        o.totals?.mode || "",
        Number(o.totals?.items||0),
        Number(o.totals?.gross||0).toFixed(2),
        Number(o.fees?.platformFeeGross||0).toFixed(2),
        Number(o.fees?.sellerMarginGross||0).toFixed(2),
        sups
      ].map(v => `"${String(v).replaceAll('"','""')}"`).join(",");
    });
    const csv = [head.join(","), ...rows].join("\n");
    const blob = new Blob([csv], { type:"text/csv;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `qm_orders_export.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  // wiring
  $("#refresh").addEventListener("click", render);
  $("#storeFilter").addEventListener("input", render);
  $("#q").addEventListener("input", render);
  $("#exportJson").addEventListener("click", exportJSON);
  $("#exportCsv").addEventListener("click", exportCSV);
  $("#clearOrders").addEventListener("click", () => { Orders.clear(); render(); });

  setShopLinks();
  render();

  window.addEventListener("qm:orders", render);
})();
</script>

</body>
</html>
