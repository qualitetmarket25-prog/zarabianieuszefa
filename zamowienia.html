<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QualitetMarket — Zamówienia</title>
<link rel="stylesheet" href="app-layout.css">
</head>
<body>
<script src="app-shell.js"></script>
<script src="auto-margin.js"></script>
<script src="js/subscriptions.js"></script>
<script src="js/planGuard.js"></script>
<script>

const orders = qmUtils.read('qm_orders_v1',[]);
renderShell({
  title:'QualitetMarket — Zamówienia',
  subtitle:'Lista zamówień',
  content: `
    <section class="hero">
      <span class="badge">Zamówienia</span>
      <h1>Historia zamówień</h1>
      <p>Tu widzisz wszystkie zapisane checkouty z aplikacji.</p>
    </section>
    <div id="ordersList" class="list" style="margin-top:18px"></div>
  `
});
const el = document.getElementById('ordersList');
if(!orders.length){
  el.innerHTML = `<div class="empty">Brak zamówień.</div>`;
}else{
  el.innerHTML = orders.map(o=>`
    <article class="card">
      <h3>${o.id}</h3>
      <p>Klient: ${o.customer.name} • ${o.customer.email}</p>
      <p>Plan: ${String(o.plan).toUpperCase()} • Razem: ${qmUtils.money(o.total)}</p>
      <p class="muted">${new Date(o.createdAt).toLocaleString('pl-PL')}</p>
    </article>
  `).join('');
}

</script>

</body>
</html>
