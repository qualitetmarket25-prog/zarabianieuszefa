<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Zamówienia — QualitetMarket</title>
  <link rel="icon" href="uszefaqualitet-logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app-layout.css">
</head>
<body>
  
<main class="container">
  <section class="hero">
    <div class="card pad">
      <h1 class="h1">Zamówienia</h1>
      <div id="ordersWrap"></div>
    </div>
  </section>
</main>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const orders = JSON.parse(localStorage.getItem('qm_orders_v1')||'[]');
  const wrap = document.getElementById('ordersWrap');
  if (!orders.length){
    wrap.innerHTML = '<div class="empty">Brak zamówień.</div>';
    return;
  }
  wrap.innerHTML = `
    <table class="table">
      <thead><tr><th>ID</th><th>Data</th><th>Klient</th><th>Kwota</th></tr></thead>
      <tbody>${orders.map(o=>`<tr><td>${o.id}</td><td>${new Date(o.createdAt).toLocaleString('pl-PL')}</td><td>${o.customer.name}</td><td>${o.total.toFixed(2)} PLN</td></tr>`).join('')}</tbody>
    </table>
  `;
});
</script>

  <script src="js/subscriptions.js"></script>
  <script src="js/planGuard.js"></script>
  <script src="auto-margin.js"></script>
  <script src="app-shell.js"></script>
  
</body>
</html>
