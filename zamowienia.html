<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zamówienia</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
color:#111;
}
header{
background:#111;
color:#fff;
padding:14px;
font-size:18px;
font-weight:bold;
}
.container{
max-width:700px;
margin:0 auto;
padding:12px;
}
.card{
background:#fff;
border-radius:12px;
padding:14px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.order{
border:1px solid #eee;
border-radius:12px;
padding:12px;
margin-bottom:10px;
}
.title{
font-size:17px;
font-weight:bold;
margin-bottom:6px;
}
.small{
font-size:13px;
color:#666;
margin-bottom:6px;
}
.row{
display:flex;
justify-content:space-between;
gap:10px;
margin-top:8px;
font-size:14px;
}
.item{
padding:8px 0;
border-top:1px solid #f0f0f0;
font-size:14px;
}
.btn,
button{
display:block;
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
text-align:center;
text-decoration:none;
box-sizing:border-box;
cursor:pointer;
}
.btn-black{
background:#111;
color:#fff;
}
.btn-white{
background:#fff;
color:#111;
border:1px solid #ddd;
}
.top-actions{
display:flex;
gap:10px;
}
.top-actions a{
flex:1;
}
.empty{
text-align:center;
padding:20px 10px;
color:#666;
}
.status{
display:inline-block;
padding:6px 10px;
border-radius:999px;
background:#efefef;
font-size:12px;
font-weight:bold;
margin-top:4px;
}
</style>
</head>
<body>

<header>
Zamówienia
</header>

<div class="container">

<div class="card">
<div id="storeBox">Aktywny sklep: —</div>
</div>

<div class="card">
<div class="top-actions">
<a href="sklep.html" class="btn btn-white">Sklep</a>
<a href="koszyk.html" class="btn btn-white">Koszyk</a>
</div>
</div>

<div class="card">
<div id="ordersBox"></div>
</div>

</div>

<script>
const ORDERS_KEY = "qm_orders_v1";
const STORE_KEY = "qm_active_store_v1";

function safeParse(value, fallback){
  try{
    return JSON.parse(value);
  }catch(e){
    return fallback;
  }
}

function formatPrice(value){
  return Number(value || 0).toFixed(2) + " zł";
}

function formatDate(value){
  if(!value) return "-";
  const d = new Date(value);
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const yyyy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2,"0");
  const min = String(d.getMinutes()).padStart(2,"0");
  return dd + "." + mm + "." + yyyy + " " + hh + ":" + min;
}

function getStore(){
  return safeParse(localStorage.getItem(STORE_KEY), null);
}

function getOrders(){
  return safeParse(localStorage.getItem(ORDERS_KEY), []);
}

function getStoreOrders(){
  const store = getStore();
  const orders = getOrders();

  if(!store) return [];

  return orders.filter(function(order){
    if(order.store && order.store.id){
      return String(order.store.id) === String(store.id);
    }

    if(order.storeId){
      return String(order.storeId) === String(store.id);
    }

    return false;
  }).sort(function(a,b){
    return Number(b.date || 0) - Number(a.date || 0);
  });
}

function countItems(order){
  return (order.items || []).reduce(function(sum,item){
    return sum + Number(item.qty || 0);
  }, 0);
}

function totalOrder(order){
  return (order.items || []).reduce(function(sum,item){
    return sum + (Number(item.price || 0) * Number(item.qty || 0));
  }, 0);
}

function renderStore(){
  const store = getStore();
  document.getElementById("storeBox").innerText =
    "Aktywny sklep: " + (store && store.name ? store.name : "brak");
}

function renderOrders(){
  const box = document.getElementById("ordersBox");
  const orders = getStoreOrders();

  if(!orders.length){
    box.innerHTML =
      '<div class="empty">Brak zamówień.</div>' +
      '<div style="margin-top:12px;"><a href="sklep.html" class="btn btn-black">Przejdź do sklepu</a></div>';
    return;
  }

  box.innerHTML = "";

  orders.forEach(function(order){
    const div = document.createElement("div");
    div.className = "order";

    let itemsHtml = "";
    (order.items || []).forEach(function(item){
      itemsHtml +=
        '<div class="item">' +
        (item.name || "Produkt") +
        ' × ' + Number(item.qty || 0) +
        ' — ' + formatPrice(Number(item.price || 0) * Number(item.qty || 0)) +
        '</div>';
    });

    div.innerHTML =
      '<div class="title">Zamówienie #' + order.id + '</div>' +
      '<div class="small">Data: ' + formatDate(order.date) + '</div>' +
      '<div class="status">' + (order.status || "nowe") + '</div>' +
      '<div class="row"><span>Liczba sztuk</span><strong>' + countItems(order) + '</strong></div>' +
      '<div class="row"><span>Wartość</span><strong>' + formatPrice(totalOrder(order)) + '</strong></div>' +
      '<div style="margin-top:10px;">' + itemsHtml + '</div>';

    box.appendChild(div);
  });
}

renderStore();
renderOrders();
</script>

<script src="js/config.js"></script>
<script src="js/planGuard.js"></script>

</body>
</html>
