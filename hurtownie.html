<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Dashboard — QualitetMarket</title>
  <link rel="icon" href="uszefaqualitet-logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app-layout.css">
</head>
<body>
  
<main class="container">
  <section class="hero">
    <div class="kpi-grid">
      <div class="card pad kpi"><div class="label">Plan</div><div class="value" id="planKpi">—</div></div>
      <div class="card pad kpi"><div class="label">Marża</div><div class="value" id="marginKpi">—</div></div>
      <div class="card pad kpi"><div class="label">Produkty</div><div class="value" id="productsKpi">—</div></div>
      <div class="card pad kpi"><div class="label">Zamówienia</div><div class="value" id="ordersKpi">—</div></div>
    </div>
  </section>
  <section class="section">
    <div class="grid-2">
      <div class="card pad">
        <h2 class="h2">Status biznesu</h2>
        <div class="notice success">Subskrypcje i automatyczna marża są gotowe do startu. Po imporcie produktów system sam przelicza ceny pod sprzedaż.</div>
      </div>
      <div class="card pad">
        <h2 class="h2">Szybkie akcje</h2>
        <div class="actions">
          <a class="btn btn-primary" href="cennik.html">Zmień plan</a>
          <button class="btn btn-secondary" data-apply-margin>Przelicz cały katalog</button>
        </div>
      </div>
    </div>
  </section>
</main>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const s = QMSubscriptions.getSubscription();
  document.getElementById('planKpi').textContent = s.plan.toUpperCase();
  document.getElementById('marginKpi').textContent = s.marginPct + '%';
  document.getElementById('productsKpi').textContent = (JSON.parse(localStorage.getItem('qm_products_by_supplier_v1')||'[]')||[]).length;
  document.getElementById('ordersKpi').textContent = (JSON.parse(localStorage.getItem('qm_orders_v1')||'[]')||[]).length;
});
</script>

  <script src="js/subscriptions.js"></script>
  <script src="js/planGuard.js"></script>
  <script src="auto-margin.js"></script>
  <script src="app-shell.js"></script>
  
</body>
</html>
