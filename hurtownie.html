<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QualitetMarket — Checkout</title>
<link rel="stylesheet" href="app-layout.css">
</head>
<body>
<script src="app-shell.js"></script>
<script src="auto-margin.js"></script>
<script src="js/subscriptions.js"></script>
<script src="js/planGuard.js"></script>
<script>

function readCart(){ return qmUtils.read('qm_cart_v1',[]); }
function writeCart(cart){ qmUtils.write('qm_cart_v1', cart); }
function total(cart){ return cart.reduce((s,i)=>s + Number(i.price)*Number(i.qty), 0); }

renderShell({
  title:'QualitetMarket — Checkout',
  subtitle:'Finalizacja zamówienia',
  content: `
    <section class="hero">
      <span class="badge">Checkout</span>
      <h1>Dokończ zamówienie</h1>
      <p>Po zapisaniu zamówienie pojawi się na liście w zamówieniach.</p>
    </section>
    <section class="card" style="margin-top:18px">
      <form id="orderForm" class="form-grid">
        <div class="col-6"><label>Imię i nazwisko<input class="input" name="name" required></label></div>
        <div class="col-6"><label>E-mail<input class="input" type="email" name="email" required></label></div>
        <div class="col-12"><label>Adres<input class="input" name="address" required></label></div>
        <div class="col-6"><label>Miasto<input class="input" name="city" required></label></div>
        <div class="col-6"><label>Kod pocztowy<input class="input" name="zip" required></label></div>
        <div class="col-12"><button class="btn btn-primary" type="submit">Zapisz zamówienie</button></div>
      </form>
    </section>
    <section class="card" style="margin-top:18px"><div id="checkoutSummary"></div></section>
  `
});

const cart = readCart();
const sum = total(cart);
document.getElementById('checkoutSummary').innerHTML = cart.length
  ? `<strong>Produkty: ${cart.length}</strong><div class="muted">Łącznie: ${qmUtils.money(sum)}</div>`
  : `<div class="empty">Koszyk jest pusty.</div>`;

document.getElementById('orderForm').addEventListener('submit', function(e){
  e.preventDefault();
  if(!cart.length){ alert('Koszyk jest pusty.'); return; }
  const fd = new FormData(this);
  const order = {
    id: qmUtils.uid('ord'),
    createdAt: new Date().toISOString(),
    customer: Object.fromEntries(fd.entries()),
    items: cart,
    total: sum,
    plan: localStorage.getItem('qm_plan_v1') || 'basic'
  };
  const orders = qmUtils.read('qm_orders_v1',[]);
  orders.unshift(order);
  qmUtils.write('qm_orders_v1', orders);
  writeCart([]);
  location.href = 'zamowienia.html';
});

</script>

</body>
</html>
