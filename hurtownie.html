<body>
<main class="wrap">

<!-- ===== HERO ===== -->

<section class="hero">

<h1>Hurtownie</h1>

<p class="lead">
Importuj CSV z hurtowni → ustaw marżę → produkty pojawią się w sklepie.
</p>

</section>


<!-- =========================
IMPORT CSV
========================= -->

<section class="section">

<div class="head">
<h2>Import CSV</h2>
<p>Wgraj plik CSV z hurtowni</p>
</div>

<div class="card">

<input type="file" id="csvFile" accept=".csv" class="btn btn-ghost">

<br><br>

<button class="btn btn-main" onclick="qmImportCSV()">
Importuj produkty
</button>

<div id="csvStatus" style="margin-top:10px;color:#9db0cf"></div>

</div>

</section>



<!-- =========================
STANDARD
========================= -->

<section class="section">

<div class="head">
<h2>Hurtownie standard</h2>
</div>

<div class="grid">

<article class="card">
<div class="title">Import własny CSV</div>
<p class="desc">
Użyj importu powyżej
</p>
</article>

</div>

</section>



</main>



<script>

const LS_PRODUCTS_SUPPLIER = "qm_products_by_supplier_v1";

function qmParseCSV(text){

const lines = text.split("\n");

const headers = lines[0].split(",");

const result = [];

for(let i=1;i<lines.length;i++){

const row = lines[i].split(",");

if(row.length < 2) continue;

let obj = {};

headers.forEach((h,idx)=>{
obj[h.trim()] = row[idx];
});

result.push(obj);

}

return result;

}



function qmImportCSV(){

const fileInput = document.getElementById("csvFile");

const status = document.getElementById("csvStatus");

if(!fileInput.files.length){

status.textContent = "Wybierz plik CSV";

return;

}

const file = fileInput.files[0];

const reader = new FileReader();

reader.onload = function(e){

const text = e.target.result;

const products = qmParseCSV(text);

localStorage.setItem(

LS_PRODUCTS_SUPPLIER,

JSON.stringify(products)

);

status.textContent =

"Zaimportowano: " + products.length + " produktów";

};

reader.readAsText(file);

}

</script>


</body>
</html>
