<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Hurtownie — QualitetMarket</title>
  <link rel="icon" href="uszefaqualitet-logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app-layout.css">
</head>
<body>
  
<main class="container">
  <section class="hero">
    <div class="grid-2">
      <div class="card pad">
        <span class="tag">Hurtownie</span>
        <h1 class="h1">Gotowe linki i import pod start.</h1>
        <p class="lead">Kliknięcie „Załaduj demo produkty” ustawia katalog w localStorage i od razu nakłada automatyczną marżę według planu.</p>
        <div class="actions" style="margin-top:16px">
          <button id="seedBtn" class="btn btn-primary">Załaduj demo produkty</button>
          <button class="btn btn-secondary" data-apply-margin>Przelicz marżę ponownie</button>
        </div>
      </div>
      <div class="card pad">
        <h2 class="h2">Linki do dostawców</h2>
        <div class="list">
          <a href="https://www.aliexpress.com/" target="_blank" rel="noopener">AliExpress</a>
          <a href="https://app.cjdropshipping.com/" target="_blank" rel="noopener">CJ Dropshipping</a>
          <a href="https://www.eprolo.com/" target="_blank" rel="noopener">EPROLO</a>
          <a href="https://www.vidaxl.com/" target="_blank" rel="noopener">VidaXL</a>
          <a href="https://www.banggood.com/" target="_blank" rel="noopener">Banggood</a>
        </div>
      </div>
    </div>
  </section>
</main>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('seedBtn').addEventListener('click', ()=>{
    QMAutoMargin.seedDemoIfEmpty();
    QMAutoMargin.applyToCatalog();
    alert('Produkty załadowane i przeliczone po marży.');
  });
});
</script>

  <script src="js/subscriptions.js"></script>
  <script src="js/planGuard.js"></script>
  <script src="auto-margin.js"></script>
  <script src="app-shell.js"></script>
  
</body>
</html>
