<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QualitetMarket — Hurtownie</title>
<link rel="stylesheet" href="app-layout.css">
</head>
<body>
<script src="app-shell.js"></script>
<script src="auto-margin.js"></script>
<script src="js/subscriptions.js"></script>
<script src="js/planGuard.js"></script>
<script>

const demo = [
  {id:'p1', supplier:'AliExpress', name:'Mini blender USB', basePrice:29.90, img:'https://images.unsplash.com/photo-1570222094114-d054a817e56b?auto=format&fit=crop&w=300&q=80'},
  {id:'p2', supplier:'CJ Dropshipping', name:'Lampa LED biurkowa', basePrice:54.00, img:'https://images.unsplash.com/photo-1519710164239-da123dc03ef4?auto=format&fit=crop&w=300&q=80'},
  {id:'p3', supplier:'EPROLO', name:'Słuchawki bezprzewodowe', basePrice:89.00, img:'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=300&q=80'},
  {id:'p4', supplier:'VidaXL', name:'Krzesło gamingowe', basePrice:249.00, img:'https://images.unsplash.com/photo-1580480055273-228ff5388ef8?auto=format&fit=crop&w=300&q=80'}
];
renderShell({
  title:'QualitetMarket — Hurtownie',
  subtitle:'Import produktów',
  content: `
    <section class="hero">
      <span class="badge">Hurtownie i dropshipping</span>
      <h1>Załaduj produkty do sklepu</h1>
      <p>Wgraj demo produkty albo własny CSV. Ceny w sklepie liczą się automatycznie z Twoją marżą.</p>
      <div class="hero-actions">
        <button class="btn btn-primary" onclick="loadDemoProducts()">Załaduj demo produkty</button>
        <label class="btn btn-secondary" for="csvFile">Import CSV</label>
        <input id="csvFile" type="file" accept=".csv" class="hidden">
      </div>
    </section>
    <div class="section-title"><h2>Dostawcy</h2><span class="muted">AliExpress / CJ / EPROLO / VidaXL / Banggood</span></div>
    <section class="module-grid">
      ${['AliExpress','CJ Dropshipping','EPROLO','VidaXL','Banggood','BigBuy','Hertwill'].map(s=>`<article class="module"><div class="emoji">🏭</div><h3>${s}</h3><p>Gotowy pod prosty model dropshippingu.</p></article>`).join('')}
    </section>
    <div class="section-title"><h2>Stan importu</h2></div>
    <div id="importState" class="empty">Brak danych.</div>
  `
});

window.loadDemoProducts = function(){
  const enriched = qmMargin.enrichProducts(demo);
  qmUtils.write('qm_products_by_supplier_v1', enriched);
  renderImportState();
  alert('Demo produkty zapisane do qm_products_by_supplier_v1');
}

document.getElementById('csvFile').addEventListener('change', async (e)=>{
  const file = e.target.files?.[0];
  if(!file) return;
  const text = await file.text();
  const rows = text.trim().split(/\r?\n/);
  const header = rows.shift().split(',').map(v=>v.trim().toLowerCase());
  const data = rows.map(line=>{
    const cols = line.split(',');
    const obj = {};
    header.forEach((h,i)=> obj[h]= (cols[i] || '').trim());
    return {
      id: obj.id || qmUtils.uid('prod'),
      supplier: obj.supplier || 'CSV',
      name: obj.name || obj.title || 'Produkt',
      basePrice: Number(obj.baseprice || obj.price || 0),
      img: obj.img || obj.image || ''
    };
  });
  qmUtils.write('qm_products_by_supplier_v1', qmMargin.enrichProducts(data));
  renderImportState();
  alert('CSV zaimportowany.');
});

function renderImportState(){
  const list = qmUtils.read('qm_products_by_supplier_v1',[]);
  const el = document.getElementById('importState');
  if(!list.length){
    el.className='empty';
    el.textContent='Brak produktów w qm_products_by_supplier_v1';
    return;
  }
  el.className='';
  el.innerHTML = `<div class="table-wrap"><table><thead><tr><th>Produkt</th><th>Dostawca</th><th>Baza</th><th>Cena sprzedaży</th></tr></thead><tbody>${
    list.map(p=>`<tr><td>${p.name}</td><td>${p.supplier || '-'}</td><td>${qmUtils.money(p.basePrice)}</td><td>${qmUtils.money(p.price)}</td></tr>`).join('')
  }</tbody></table></div>`;
}
renderImportState();

</script>

</body>
</html>
